    # APSS ETR
    - name: Flush_ETR_APSS
      blocks:
        - execute: |
            // Helper variables
            __var savedAPID   = __apid;
            __var ffcrValue   = 0x00000000;
            __var etrStatus   = 0x00000000;

            Message(0, "Begin Flush_ETR_APSS @0x%08X, APID 0x%08X", APSS_ETR_ADDRESS, APSS_ETR_APID);

            __apid = APSS_ETR_APID; // Set APID

        - execute: |
            // Flush ETR first so the HW FIFO drains towards the TPIU.
            ffcrValue = Read32(APSS_ETR_ADDRESS + 0x304);
            ffcrValue &= ~(0x00001040); // Clear StopOnFlush and FlushOnManual
            ffcrValue |= 0x00001000;    // Stop after the manual flush completes
            Write32(APSS_ETR_ADDRESS + 0x304, ffcrValue);
            ffcrValue |= 0x00000040;    // Trigger manual flush
            Write32(APSS_ETR_ADDRESS + 0x304, ffcrValue);

        - execute: |
            ffcrValue = Read32(APSS_ETR_ADDRESS + 0x304);
        - while: (ffcrValue & 0x40) != 0
          info: "Wait for ETR manual flush to complete"
          timeout: 100
          blocks:
            - execute: |
                ffcrValue = Read32(APSS_ETR_ADDRESS + 0x304);

        - execute: |
            etrStatus = Read32(APSS_ETR_ADDRESS + 0x00C);
        - while: (etrStatus & 0x4) == 0
          info: "Wait for ETR to become ready"
          timeout: 100
          blocks:
            - execute: |
                etrStatus = Read32(APSS_ETR_ADDRESS + 0x00C);

        - execute: |
            // Disable ETR after flush until next run/step
            Write32(APSS_ETR_ADDRESS + 0x020, 0x00000000);
            etrStatus = Read32(APSS_ETR_ADDRESS + 0x00C);
        - while: (etrStatus & 0x4) == 0
          info: "Wait for TMCReady"
          timeout: 100
          blocks:
            - execute: |
                etrStatus = Read32(APSS_ETR_ADDRESS + 0x00C);

        - execute: |
            __apid = savedAPID;
            Message(0, "End Flush_ETR_APSS @0x%08X, APID 0x%08X", APSS_ETR_ADDRESS, APSS_ETR_APID);

    - name: Configure_ETR_CircularBuffer_APSS
