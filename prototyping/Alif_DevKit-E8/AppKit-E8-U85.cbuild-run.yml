                Sequence("Configure_ETR_CATU_SOC");
                Sequence("Configure_ETR_CircularBuffer_SOC");
                Sequence("Configure_ETR_CATU_APSS");
                Sequence("Configure_ETR_CircularBuffer_APSS");
                Sequence("Configure_Replicator_SOC_TPIU");
                Sequence("Configure_Funnel_SOC_TPIU");
                Sequence("Configure_Replicator_APSS");
                Sequence("Configure_Funnel_APSS");

        - execute: |
              Message(0, "End TraceStartExt");

    - name: TraceCapture
