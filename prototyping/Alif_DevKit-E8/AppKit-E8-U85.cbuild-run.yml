    # SOC TPIU 
    # Component mapped to DP memory space, use ReadAccessAP/WriteAccessAP functions
    - name: Flush_TPIU_SOC_TPIU
      blocks:
        - execute: |
            // Helper variables
            __var ffcrValue   = 0x00000000;
            __var ffsrValue   = 0x00000000;

            Message(0, "Begin Flush_TPIU_SOC_TPIU @0x%08X, DP MEMSPACE", SOC_TPIU_ADDRESS);
            
        - execute: |
            // Configure "local" TPIU for Sync Trace
            ffsrValue = ReadAccessAP(SOC_TPIU_ADDRESS + 0x300);
        - if: ffsrValue & 0x2 == 0
          info: "Formatter not stopped, do it now"
          blocks:

          - execute: |
              // Flush the TPIU formatter so pending packets leave the trace port.
              ffcrValue = ReadAccessAP(SOC_TPIU_ADDRESS + 0x304);
              ffcrValue &= ~(0x00001040); // Clear StopOnFlush and FlushOnManual
              ffcrValue |= 0x00001000;    // Stop after the manual flush completes
              WriteAccessAP(SOC_TPIU_ADDRESS + 0x304, ffcrValue);
              ffcrValue |= 0x00000040;    // Trigger manual flush
              WriteAccessAP(SOC_TPIU_ADDRESS + 0x304, ffcrValue);

          - execute: |
              ffcrValue = ReadAccessAP(SOC_TPIU_ADDRESS + 0x304);
          - while: (ffcrValue & 0x40) != 0
            info: "Wait for TPIU manual flush to complete"
            timeout: 100
            blocks:
              - execute: |
                  ffcrValue = ReadAccessAP(SOC_TPIU_ADDRESS + 0x304);

          - execute: |
              ffsrValue = ReadAccessAP(SOC_TPIU_ADDRESS + 0x300);
          - while: (ffsrValue & 0x1) != 0
            info: "Wait for TPIU flush in progress to clear"
            timeout: 100
            blocks:
              - execute: |
                  ffsrValue = ReadAccessAP(SOC_TPIU_ADDRESS + 0x300);

        - execute: |
            Message(0, "End Flush_TPIU_SOC_TPIU @0x%08X, DP MEMSPACE", SOC_TPIU_ADDRESS);

    - name: Configure_TPIU_SOC_TPIU
      blocks:
          - execute: |
                // Temporary - Parameters, set from debugger going forward

                // TEMP_TRACEOUT: replace with __traceout when available from debugger,
                //                or move trace mode decision to new built-in variable.
                __var swoTrace    = 0; // TEMP_TRACEOUT & 0x1; // SWO not supported
                __var syncTrace   = TEMP_TRACEOUT & 0x2;
                __var bufferTrace = TEMP_TRACEOUT & 0x4;
                __var tracePortWidth = (TEMP_TRACEOUT >> 16) & 0x3F; // Parallel trace port size

                // Helper variables
                __var LAR_KEY   = 0xC5ACCE55;

                Message(0, "Begin Configure_TPIU_SOC_TPIU @0x%08X, DP MEMSPACE", SOC_TPIU_ADDRESS);

          - if: swoTrace != 0
            blocks:
              - execute: |
                  WriteAccessAP(SOC_TPIU_ADDRESS + 0xFB0, LAR_KEY);       // TODO: Double-check if still necessary
                  WriteAccessAP(SOC_TPIU_ADDRESS + 0x010, SOC_SWO_PRESCALER); // TPIU Asynchronous Clock Prescaler Register: No prescaling
                  WriteAccessAP(SOC_TPIU_ADDRESS + 0x0F0, 0x00000002);    // TPIU Selected Pin Protocol Register: Select SWO 

          - if: syncTrace != 0
            blocks:
              - execute: |
                  WriteAccessAP(SOC_TPIU_ADDRESS + 0xFB0, LAR_KEY);        // TODO: Double-check if still necessary
                  WriteAccessAP(SOC_TPIU_ADDRESS + 0x010, SOC_TPIU_PRESCALER); // TPIU Asynchronous Clock Prescaler Register: No prescaling
                  WriteAccessAP(SOC_TPIU_ADDRESS + 0x004, 1 << (tracePortWidth - 1));  // TPIU Current Synchronous Port Width
                  WriteAccessAP(SOC_TPIU_ADDRESS + 0x0F0, 0x00000000);     // TPIU Selected Pin Protocol Register: Select Sync Trace Port
                  ffcrValue  = ReadAccessAP(SOC_TPIU_ADDRESS + 0x304);
                  ffcrValue |= 0x00000002;                    // Enable formatter
                  WriteAccessAP(SOC_TPIU_ADDRESS + 0x304, ffcrValue);      // TPIU FFCR

          - execute: |
                Message(0, "End Configure_TPIU_SOC_TPIU @0x%08X, DP MEMSPACE", SOC_TPIU_ADDRESS);

    - name: TraceCapture_TPIU_SOC_TPIU
      blocks:
      - execute: |
          // Helper variables
          __var LAR_KEY   = 0xC5ACCE55;

          Message(0, "Begin TraceCapture_TPIU_SOC_TPIU @0x%08X, DP MEMSPACE", SOC_TPIU_ADDRESS);

          // Ensure involved components are in a well-defined state.
          Sequence("TraceFlush");

          // Configure TPIU if needed and enable formatter
          ffcrValue  = ReadAccessAP(SOC_TPIU_ADDRESS + 0x304);
          ffcrValue |= 0x00000002;                                // Enable formatter
          WriteAccessAP(SOC_TPIU_ADDRESS + 0x304, ffcrValue);                  // TPIU FFCR

          Message(0, "End TraceCapture_TPIU_SOC_TPIU @0x%08X, DP MEMSPACE", SOC_TPIU_ADDRESS);


    - name: DebugCoreStart
      blocks:
        - execute: |
            // ***** TEMPORARY, TRACE START SEQUENCE MUST BE CALLED BY DEBUGGER *****

            // ***** Default Implementation *****
            // System Control Space (SCS) offset as defined in Armv6-M/Armv7-M.
            __var SCS_Addr   = 0xE000E000;
            __var DHCSR_Addr = SCS_Addr + 0xDF0;

            Message(0, "Begin DebugCoreStart sequence");

            // Enable Core Debug via DHCSR
            Write32(DHCSR_Addr, 0xA05F0001);

            // ***** Custom Extension for Testing, TraceStart should be called from debugger *****
            // Configure core-local trace blocks only after CPU debug is enabled.
            Sequence("TraceStart");

            Sequence("TraceFlush");

            Sequence("TraceCapture");

            Message(0, "End DebugCoreStart sequence"); 
