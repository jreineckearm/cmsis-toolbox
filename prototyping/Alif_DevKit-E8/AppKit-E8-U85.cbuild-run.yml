        - execute: |              
            Message(0, "End TraceFlush");

    # SOC TPIU FUNNEL
    # Component mapped to DP memory space, use ReadAccessAP/WriteAccessAP functions
    - name: Configure_Funnel_SOC_TPIU
      blocks:
      - execute: |
          // Helper variables
          // __var savedAP    = __ap;
          __var value      = 0x00000000;

          Message(0, "Begin Configure_Funnel_SOC_TPIU @0x%08X, DP MEMSPACE", SOC_TPIU_FUNNEL_ADDRESS);

          value = ReadAccessAP(SOC_TPIU_FUNNEL_ADDRESS + 0x000);
          value &= ~0xFF;              // Clear existing funnel input enables, keep hold time
          value |= SOC_TPIU_FUNNEL_INPUT_MASK;  // Keep hold time as is for now, could be made configurable if needed

      - execute: |
          WriteAccessAP(SOC_TPIU_FUNNEL_ADDRESS + 0x000, value); // Configure CoreSight Trace Funnel to enable selected trace sources
          Message(0, "End Configure_Funnel_SOC_TPIU");

    # SOC TPIU REPLICATOR
    # Component mapped to DP memory space, use ReadAccessAP/WriteAccessAP functions
    - name: Configure_Replicator_SOC_TPIU
      blocks:
      - execute: |
          // Helper variables
          __var value      = 0x00000000;

          Message(0, "Begin Configure_Replicator_SOC_TPIU @0x%08X, DP MEMSPACE", SOC_TPIU_REPLICATOR_ADDRESS);

          WriteAccessAP(SOC_TPIU_REPLICATOR_ADDRESS + 0x000, SOC_TPIU_REPLICATOR_ID_FILTER0);
          WriteAccessAP(SOC_TPIU_REPLICATOR_ADDRESS + 0x004, SOC_TPIU_REPLICATOR_ID_FILTER1);

          Message(0, "End Configure_Replicator_SOC_TPIU @0x%08X, DP MEMSPACE", SOC_TPIU_REPLICATOR_ADDRESS);

    # SOC ETR
    # Component mapped to DP memory space, use ReadAccessAP/WriteAccessAP functions
    - name: Flush_ETR_SOC
      blocks:
        - execute: |
            // Helper variables
            __var ffcrValue   = 0x00000000;
            __var etrStatus   = 0x00000000;

            Message(0, "Begin Flush_ETR_SOC @0x%08X, DP MEMSPACE", SOC_ETR_ADDRESS);

        - execute: |
            // Flush ETR first so the HW FIFO drains towards the TPIU.
            ffcrValue = ReadAccessAP(SOC_ETR_ADDRESS + 0x304);
            ffcrValue &= ~(0x00001040); // Clear StopOnFlush and FlushOnManual
            ffcrValue |= 0x00001000;    // Stop after the manual flush completes
            WriteAccessAP(SOC_ETR_ADDRESS + 0x304, ffcrValue);
            ffcrValue |= 0x00000040;    // Trigger manual flush
            WriteAccessAP(SOC_ETR_ADDRESS + 0x304, ffcrValue);

        - execute: |
            ffcrValue = ReadAccessAP(SOC_ETR_ADDRESS + 0x304);
        - while: (ffcrValue & 0x40) != 0
          info: "Wait for ETR manual flush to complete"
          timeout: 100
          blocks:
            - execute: |
                ffcrValue = ReadAccessAP(SOC_ETR_ADDRESS + 0x304);

        - execute: |
            etrStatus = ReadAccessAP(SOC_ETR_ADDRESS + 0x00C);
        - while: (etrStatus & 0x4) == 0
          info: "Wait for ETR to become ready"
          timeout: 100
          blocks:
            - execute: |
                etrStatus = ReadAccessAP(SOC_ETR_ADDRESS + 0x00C);

        - execute: |
            // Disable ETR after flush until next run/step
            WriteAccessAP(SOC_ETR_ADDRESS + 0x020, 0x00000000);
            etrStatus = ReadAccessAP(SOC_ETR_ADDRESS + 0x00C);
        - while: (etrStatus & 0x4) == 0
          info: "Wait for TMCReady"
          timeout: 100
          blocks:
            - execute: |
                etrStatus = ReadAccessAP(SOC_ETR_ADDRESS + 0x00C);

        - execute: |
            Message(0, "End Flush_ETR_SOC @0x%08X, DP MEMSPACE", SOC_ETR_ADDRESS);

    - name: Configure_ETR_CircularBuffer_SOC
      blocks:
      - execute: |
            // Helper variables
            __var ffcrValue = 0x00000000;
            __var etrStatus = 0x00000000;

            Message(0, "Begin Configure_ETR_CircularBuffer_SOC @0x%08X, DP MEMSPACE", SOC_ETR_ADDRESS);

            // Configure ETR to HW FIFO for Sync Trace
            WriteAccessAP(SOC_ETR_ADDRESS + 0x020, 0x00000000);  // Disable ETR before configuring
            etrStatus = ReadAccessAP(SOC_ETR_ADDRESS + 0x00C);
      - while: (etrStatus & 0x4) == 0
        info: "Wait for TMCReady"
        timeout: 100
        blocks:
          - execute: |
              etrStatus = ReadAccessAP(SOC_ETR_ADDRESS + 0x00C);

      - execute: |
          // Configure
          WriteAccessAP(SOC_ETR_ADDRESS + 0x028, 0x00000000);             // Set Circular Buffer mode
          WriteAccessAP(SOC_ETR_ADDRESS + 0x034, 0x00000000);             // Watermark: Set threshold vacancy to 0 to use full buffer
          WriteAccessAP(SOC_ETR_ADDRESS + 0x304, 0x00000003);             // FFCR: Enable Formatter and Trigger Insertion
          WriteAccessAP(SOC_ETR_ADDRESS + 0x01C, SOC_ETR_TRIGGER_COUNT);      // TRG: Number of words to capture after trigger
          WriteAccessAP(SOC_ETR_ADDRESS + 0x308, SOC_ETR_SYNCCNT);            // Set PSCR
          WriteAccessAP(SOC_ETR_ADDRESS + 0x018, SOC_ETR_BUFFER_ADDRESS);     // Init RwP
          WriteAccessAP(SOC_ETR_ADDRESS + 0x014, SOC_ETR_BUFFER_ADDRESS);     // Init RRP
          WriteAccessAP(SOC_ETR_ADDRESS + 0x11C, SOC_ETR_BUFFER_ADDRESS_HI);  // Init DBAHI
          WriteAccessAP(SOC_ETR_ADDRESS + 0x118, SOC_ETR_BUFFER_ADDRESS);     // Init DBALO
          WriteAccessAP(SOC_ETR_ADDRESS + 0x004, SOC_ETR_BUFFER_SIZE);        // Init RSZ
          WriteAccessAP(SOC_ETR_ADDRESS + 0x110, SOC_ETR_AXI_CTL);            // Init AXICTL
          WriteAccessAP(SOC_ETR_ADDRESS + 0xED0, SOC_ETR_AXI_CTL1);           // Init AXICTL1
          WriteAccessAP(SOC_ETR_ADDRESS + 0x03C, SOC_ETR_BUFFER_ADDRESS_HI);  // Init RWPHI
          WriteAccessAP(SOC_ETR_ADDRESS + 0x038, SOC_ETR_BUFFER_ADDRESS_HI);  // Init RRPHI
          WriteAccessAP(SOC_ETR_ADDRESS + 0x020, 0x00000001);             // Enable ETR

      - execute: |
          Message(0, "End Configure_ETR_CircularBuffer_SOC @0x%08X, DP MEMSPACE", SOC_ETR_ADDRESS);
    
    - name: TraceCapture_ETR_CircularBuffer_SOC
      blocks:
      - execute: |
          // Helper variables
          __var ffcrValue = 0x00000000;

          Message(0, "Begin TraceCapture_ETR_CircularBuffer_SOC @0x%08X, DP MEMSPACE", SOC_ETR_ADDRESS);

          // Ensure involved components are in a well-defined state.
          Sequence("TraceFlush");

          ffcrValue  = ReadAccessAP(SOC_ETR_ADDRESS + 0x304);
          ffcrValue |= 0x00000002;                              // FFCR: Enable Formatter
          WriteAccessAP(SOC_ETR_ADDRESS + 0x304, ffcrValue);
          WriteAccessAP(SOC_ETR_ADDRESS + 0x01C, SOC_ETR_TRIGGER_COUNT);      // TRG: Number of words to capture after trigger
          WriteAccessAP(SOC_ETR_ADDRESS + 0x308, SOC_ETR_SYNCCNT);            // Set PSCR
          WriteAccessAP(SOC_ETR_ADDRESS + 0x018, SOC_ETR_BUFFER_ADDRESS);     // Init RwP
          WriteAccessAP(SOC_ETR_ADDRESS + 0x014, SOC_ETR_BUFFER_ADDRESS);     // Init RRP
          WriteAccessAP(SOC_ETR_ADDRESS + 0x11C, SOC_ETR_BUFFER_ADDRESS_HI);  // Init DBAHI
          WriteAccessAP(SOC_ETR_ADDRESS + 0x118, SOC_ETR_BUFFER_ADDRESS);     // Init DBALO
          WriteAccessAP(SOC_ETR_ADDRESS + 0x004, SOC_ETR_BUFFER_SIZE);        // Init RSZ
          WriteAccessAP(SOC_ETR_ADDRESS + 0x110, SOC_ETR_AXI_CTL);            // Init AXICTL
          WriteAccessAP(SOC_ETR_ADDRESS + 0xED0, SOC_ETR_AXI_CTL1);           // Init AXICTL1
          WriteAccessAP(SOC_ETR_ADDRESS + 0x03C, SOC_ETR_BUFFER_ADDRESS_HI);  // Init RWPHI
          WriteAccessAP(SOC_ETR_ADDRESS + 0x038, SOC_ETR_BUFFER_ADDRESS_HI);  // Init RRPHI
          WriteAccessAP(SOC_ETR_ADDRESS + 0x020, 0x00000001);             // Enable ETR

          Message(0, "End TraceCapture_ETR_CircularBuffer_SOC @0x%08X, DP MEMSPACE", SOC_ETR_ADDRESS);

    # SOC ETR CATU
    # Component mapped to DP memory space, use ReadAccessAP/WriteAccessAP functions
    - name: Flush_ETR_CATU_SOC
      info: "Flush any outstanding memory transactions"
      blocks:
      - execute: |
            // Helper variables
            __var status = 0x00000000;

            Message(0, "Begin Flush_ETR_CATU_SOC @0x%08X, DP MEMSPACE", SOC_CATU_ADDRESS);

            // Disable CATU before configuration
            WriteAccessAP(SOC_CATU_ADDRESS + 0x000, 0x00000000);  

            status = ReadAccessAP(SOC_CATU_ADDRESS + 0x100);
      - while: (status & 0x0100) == 0
        info: "Wait for READY"
        timeout: 100
        blocks:
          - execute: |
              status = ReadAccessAP(SOC_CATU_ADDRESS + 0x100);

      - execute: |
          Message(0, "End Flush_ETR_CATU_SOC @0x%08X, DP MEMSPACE", SOC_CATU_ADDRESS);

