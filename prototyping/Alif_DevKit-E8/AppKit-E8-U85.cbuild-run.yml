          Message(0, "Begin Configure_Funnel_APSS @0x%08X, APID 0x%08X", APSS_FUNNEL_ADDRESS, APSS_FUNNEL_APID);

          __apid = APSS_FUNNEL_APID; // Set APID

          value = Read32(APSS_FUNNEL_ADDRESS + 0x000);
          value &= ~0xFF;                   // Clear existing funnel input enables, keep hold time
          value |= APSS_FUNNEL_INPUT_MASK;  // Keep hold time as is for now, could be made configurable if needed

      - execute: |
          Write32(APSS_FUNNEL_ADDRESS + 0x000, value); // Configure CoreSight Trace Funnel to enable selected trace sources

