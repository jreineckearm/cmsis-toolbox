            __apid = APSS_ETR_APID; // Set APID

            // Configure ETR to HW FIFO for Sync Trace
            Write32(APSS_ETR_ADDRESS + 0x020, 0x00000000);  // Disable ETR before configuring
            etrStatus = Read32(APSS_ETR_ADDRESS + 0x00C);
      - while: (etrStatus & 0x4) == 0
        info: "Wait for TMCReady"
        timeout: 100
        blocks:
          - execute: |
              etrStatus = Read32(APSS_ETR_ADDRESS + 0x00C);

      - execute: |
          // Configure
          Write32(APSS_ETR_ADDRESS + 0x028, 0x00000000);             // Set Circular Buffer mode
          Write32(APSS_ETR_ADDRESS + 0x034, 0x00000000);             // Watermark: Set threshold vacancy to 0 to use full buffer
          Write32(APSS_ETR_ADDRESS + 0x304, 0x00000003);             // FFCR: Enable Formatter and Trigger Insertion
          Write32(APSS_ETR_ADDRESS + 0x01C, APSS_ETR_TRIGGER_COUNT);      // TRG: Number of words to capture after trigger
          Write32(APSS_ETR_ADDRESS + 0x308, APSS_ETR_SYNCCNT);            // Set PSCR
          Write32(APSS_ETR_ADDRESS + 0x018, APSS_ETR_BUFFER_ADDRESS);     // Init RwP
          Write32(APSS_ETR_ADDRESS + 0x014, APSS_ETR_BUFFER_ADDRESS);     // Init RRP
          Write32(APSS_ETR_ADDRESS + 0x11C, APSS_ETR_BUFFER_ADDRESS_HI);  // Init DBAHI
          Write32(APSS_ETR_ADDRESS + 0x118, APSS_ETR_BUFFER_ADDRESS);     // Init DBALO
          Write32(APSS_ETR_ADDRESS + 0x004, APSS_ETR_BUFFER_SIZE);        // Init RSZ
          Write32(APSS_ETR_ADDRESS + 0x110, APSS_ETR_AXI_CTL);            // Init AXICTL
          Write32(APSS_ETR_ADDRESS + 0xED0, APSS_ETR_AXI_CTL1);           // Init AXICTL1
          Write32(APSS_ETR_ADDRESS + 0x03C, APSS_ETR_BUFFER_ADDRESS_HI);  // Init RWPHI
          Write32(APSS_ETR_ADDRESS + 0x038, APSS_ETR_BUFFER_ADDRESS_HI);  // Init RRPHI
          Write32(APSS_ETR_ADDRESS + 0x020, 0x00000001);             // Enable ETR

      - execute: |
          __apid = savedAPID;
          Message(0, "End Configure_ETR_CircularBuffer_APSS @0x%08X, APID 0x%08X", APSS_ETR_ADDRESS, APSS_ETR_APID);
    
    - name: TraceCapture_ETR_CircularBuffer_APSS
