          WriteAccessAP(SOC_CATU_ADDRESS + 0x02C, SOC_CATU_INPUT_ADDR_HI);        // Set INADDRHI

          // Enable CATU after configuration
          WriteAccessAP(SOC_CATU_ADDRESS + 0x000, 0x00000001);
            status = ReadAccessAP(SOC_CATU_ADDRESS + 0x100);

      - while: (status & 0x0100) == 1
        info: "Wait for READY cleared"
        timeout: 100
        blocks:
          - execute: |
              status = ReadAccessAP(SOC_CATU_ADDRESS + 0x100);

      - execute: |
          Message(0, "End Configure_ETR_CATU_SOC @0x%08X, DP MEMSPACE", SOC_CATU_ADDRESS);

    - name: Capture_ETR_CATU_SOC
      info: "Restart address translation unit"
      blocks:
      - execute: |
            // Helper variables
            __var status = 0x00000000;

            Message(0, "Begin Capture_ETR_CATU_SOC @0x%08X, DP MEMSPACE", SOC_CATU_ADDRESS);

            // Ensure involved components are in a well-defined state.
            Sequence("TraceFlush");

            // Keep initial values and re-enable CATU before next capture.
            // Clears any remaning error bits.
            WriteAccessAP(SOC_CATU_ADDRESS + 0x000, 0x00000001);

            status = ReadAccessAP(SOC_CATU_ADDRESS + 0x100);
      - while: (status & 0x0100) == 1
        info: "Wait for READY cleared"
        timeout: 100
        blocks:
