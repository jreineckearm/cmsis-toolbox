      pname: Cortex-M4
    - name: DAP_Handshake
      blocks:
        - execute: |
            __var isSWJ      = ((__protocol & 0x00010000) != 0);
            __var protType   = __protocol & 0x0000FFFF;
            __var DPIDR = 0;
            __Result = 0;
        - if: protType == 1
          blocks:
            - if: isSWJ
              atomic: 
              execute: |
                // Ensure current debug interface is in reset state
                DAP_SWJ_Sequence(51, 0x0007FFFFFFFFFFFF);
                // Execute SWJ-DP Switch Sequence SWD to JTAG (0xE73C)
                // Change if SWJ-DP uses deprecated switch code (0xAEAE)
                DAP_SWJ_Sequence(16, 0xE73C);
            - atomic: 
              execute: |
                // JTAG "Soft" Reset
                DAP_JTAG_Sequence(6, 1, 0x00);                        // Test-Logic-Reset
                // Get IDCODE to make shure that JTAG-DP is available
                DAP_JTAG_Sequence(4, 0, 0x00);                        // 4*Run-Test/Idle
                DAP_JTAG_Sequence(2, 1, 0x00);                        // ~ Select-DR ~ Select-IR
                DAP_JTAG_Sequence(2, 0, 0x00);                        // ~ Capture-IR ~ Shift-IR
                DAP_JTAG_Sequence(8, 0, 0xFE);                        // Shift-IR (IDCODE BYPASS)
                DAP_JTAG_Sequence(5, 1, 0x00);                        // ~ Exit1-IR (IDCODE BYPASS) ~ Update-IR ~ Test-Logic-Reset
                DAP_JTAG_Sequence(4, 0, 0x00);                        // Make sure that we go through Idle state in TAP controller
                DAP_JTAG_Sequence(1, 1, 0x00);                        // Select-DR
                DAP_JTAG_Sequence(2, 0, 0x00);                        // ~ Capture-DR ~ Shift-DR
                DPIDR = DAP_JTAG_Sequence(33, 0, 0x00000000);         // Shift 33-bits data
                DAP_JTAG_Sequence(5, 1, 0x00);                        // ~ Exit1-DR ~ Update-DR ~ ~ Select-DR ~ Select-IR ~ Test-Logic-Reset
                DAP_JTAG_Sequence(4, 0, 0x00);                        // Make sure that we go through Idle state in TAP controller
        - if: protType == 2
          blocks:
            - if: isSWJ
              atomic: 
              execute: |
                // Ensure current debug interface is in reset state
                DAP_SWJ_Sequence(51, 0x0007FFFFFFFFFFFF);
                // Execute SWJ-DP Switch Sequence JTAG to SWD (0xE79E)
                // Change if SWJ-DP uses deprecated switch code (0xEDB6)
                DAP_SWJ_Sequence(16, 0xE79E);
                // Enter SWD Line Reset State
                DAP_SWJ_Sequence(51, 0x0007FFFFFFFFFFFF); // More than 50 cycles SWDIO/TMS High
                DAP_SWJ_Sequence(3,  0x00);               // At least 2 idle cycles (SWDIO/TMS Low)
            - if: "!isSWJ"
              atomic: 
              execute: |
                // Enter SWD Line Reset State
                DAP_SWJ_Sequence(51, 0x0007FFFFFFFFFFFF); // More than 50 cycles SWDIO/TMS High
                DAP_SWJ_Sequence(3,  0x00);               // At least 2 idle cycles (SWDIO/TMS Low)
            - execute: |
                DPIDR = ReadDP(0x0); // Read DPIDR to enable SWD interface (SW-DPv1 and SW-DPv2)
        - if: (DPIDR & 0xFFF00FFF) != 0x6BA00477
          execute: |
            __Result = -1; // DAP is unavailable
    - name: DAP_poll
      blocks:
        - execute: |
            __Result = -1; // Assume DAP is not available yet
        - while: __Result != 0
          timeout: 600000
          execute: |
            sequence("DAP_Handshake"); // Poll DP until bootloader allows access to device (can be up to 600ms)
        - if: __Result != 0
          execute: |
            Message(1, "The Debug Access Port is unavailable.");
    - name: DebugPortSetup
      blocks:
        - execute: |
            sequence("DAP_Handshake");
        - if: __Result != 0
          blocks:
            - execute: |
                __var nReset      = 0x80;
                __var canReadPins = 0;
                canReadPins = (DAP_SWJ_Pins(0x00, nReset, 0) != 0xFFFFFFFF); // Deassert nRESET line
            - while: 1
              timeout: 50000
            - if: canReadPins
              blocks:
                - while: (DAP_SWJ_Pins(nReset, nReset, 0) & nReset) == 0
                  timeout: 1000000
            - if: "!canReadPins"
              blocks:
                - execute: |
                    DAP_SWJ_Pins(nReset, nReset, 0); // Assert nRESET line
                - while: 1
                  timeout: 100000
            - execute: |
                sequence("DAP_poll");
    - name: ResetHardware
      blocks:
        - execute: |
            __var nReset      = 0x80;
            __var canReadPins = 0;
            canReadPins = (DAP_SWJ_Pins(0x00, nReset, 0) != 0xFFFFFFFF); // Deassert nRESET line
        - while: 1
          timeout: 50000
        - if: canReadPins
          blocks:
            - while: (DAP_SWJ_Pins(nReset, nReset, 0) & nReset) == 0
              timeout: 1000000
        - if: "!canReadPins"
          blocks:
            - execute: |
                DAP_SWJ_Pins(nReset, nReset, 0); // Assert nRESET line
            - while: 1
              timeout: 100000
        - execute: |
            // Give the CAT1A bootloader time to finish (can be up to 600ms)
            DAP_Delay(600000);
    - name: PrintDeviceInfo
      blocks:
        - execute: |
            __var siId;
            __var siRev;
            __var siFamily;
            __var fbVerHi;
            __var sflashSvnVer;
            __var protection;
            __var v;
            Message(0, "****************************************************");
            // Get Si Id, Family and Rev.
            v = Read32(SFLASH_BASE_ADDR);
            siId = (v & 0xFFFF0000) >> 16;
            siRev = (v & 0x0000FF00) >> 8;
            v = Read32(SFLASH_BASE_ADDR + 0xC);
            siFamily = v & 0x00000FFF;
            Message(0, "** Silicon: 0x%04X, Family: 0x%03X, Rev.: 0x%02X", siId, siFamily, siRev);
            // Get FlashBboot verison
            fbVerHi = Read32(SFLASH_BASE_ADDR + 0x2004);
        - if: fbVerHi == 0
          execute: |
            Message(1, "Invalid FlashBoot: High version word of Flash Boot is zero");
        - if: fbVerHi != 0
          blocks:
            - execute: |
                __var fbVerLo = Read32(SFLASH_BASE_ADDR + 0x2018);
                __var b0 = fbVerHi >> 28;
                __var b1 = (fbVerHi >> 24) & 0x0F;
                __var b2 = (fbVerHi >> 16) & 0xFF;
                __var b3 = fbVerHi & 0x0000FFFF;
            - if: b0 > 2
              execute: |
                Message(1, "Unsupported Flash Boot Version - Flash Boot Version [31:28] = 0x%X", b0);
            - if: b0 <= 2
              blocks:
                - if: b3 != 0x8001
                  execute: |
                    Message(1, "Flash Boot is corrupted or non Flash Boot image programmed");
                - if: b3 == 0x8001
                  blocks:
                    - if: b0 == 0
                      blocks:
                        - if: b1 == 1
                          execute: |
                            Message(0, "** Flash Boot version: 1.%02u", b2);
                        - if: b1 == 2
                          blocks:
                            - if: b2 < 20
                              execute: |
                                Message(0, "** Flash Boot version: 1.0.0.%u", b2);
                            - if: (b2 >= 20) && (b2 < 29)
                              execute: |
                                Message(0, "** Flash Boot version: 1.0.1.%u", b2);
                            - if: b2 >= 29
                              execute: |
                                Message(0, "** Flash Boot version: 1.20.1.%u", b2);
                    - if: b0 == 1
                      execute: |
                        Message(0, "** Flash Boot version: 2.0.0.%u", b2);
                    - if: b0 == 2
                      execute: |
                        __var patch = fbVerLo >> 24;
                        __var build = fbVerLo & 0x0000FFFF;
                        Message(0, "** Flash Boot version: %u.%u.%u.%u", b1, b2, patch, build);
        - execute: |
            sflashSvnVer = Read32(SFLASH_BASE_ADDR + 0x28); // Get SFLASH version
        - if: (sflashSvnVer != 0) && (sflashSvnVer != 0xFFFFFFFF)
          execute: |
            Message(0, "** SFlash version: %u", sflashSvnVer);
        - if: siFamily == 0x100
          execute: |
            protection = Read32(0x40210500); // PSoC 6-BLE2 family
        - if: siFamily != 0x100
          execute: |
            protection = Read32(0x402020C4); // PSoC 6-2M family
        - if: protection == 1
          execute: |
            Message(0, "** Chip Protection: VIRGIN");
        - if: protection == 2
          execute: |
            Message(0, "** Chip Protection: NORMAL");
        - if: protection == 3
          execute: |
            Message(0, "** Chip Protection: SECURE");
        - if: protection == 4
          execute: |
            Message(0, "** Chip Protection: DEAD");
        - if: (protection == 0) || (protection > 4)
          execute: |
            Message(0, "** Chip Protection: UNKNOWN");
        - execute: |
            Message(0, "****************************************************");
    - name: DebugPortStart
      blocks:
        - info: Read DP CTRL/STAT
          execute: |
            __var SW_DP_ABORT  = 0x0;
            __var DP_CTRL_STAT = 0x4;
            __var DP_SELECT    = 0x8;
            __var powered_down = 0;
            // Switch to DP Register Bank 0. Explicitly set APSEL to current AP selection
            WriteDP(DP_SELECT, __ap << 24);
            // Read DP CTRL/STAT Register and check if CSYSPWRUPACK and CDBGPWRUPACK bits are set
            powered_down = ((ReadDP(DP_CTRL_STAT) & 0xA0000000) != 0xA0000000);
        - if: powered_down
          blocks:
            - info: Power Up System & Debug
              execute: |
                // Request Debug/System Power-Up
                // Ignore error here: even there is a polling in the next block, CMSIS-DAP transports reads DP.RDBUFF register
                // right after write to DP.CTRL_STAT. This will fail for some cases - for example if device is waking from DeepSleep.
                __errorcontrol = 1;
                WriteDP(DP_CTRL_STAT, 0x50000000);
                __errorcontrol = 0;
            - info: Wait for power acknowledged
              while: (ReadDP(DP_CTRL_STAT) & 0xA0000000) != 0xA0000000
              timeout: 1000000
            - info: "JTAG: Clear Sticky Bits"
              if: (__protocol & 0xFFFF) == 1
              execute: |
                // Init AP Transfer Mode, Transaction Counter, and Lane Mask (Normal Transfer Mode, Include all Byte Lanes)
                // Additionally clear STICKYORUN, STICKYCMP, and STICKYERR bits by writing '1'
                WriteDP(DP_CTRL_STAT, 0x50000F32);
            - info: "SWD: Init SWD & Clear Sticky Bits"
              if: (__protocol & 0xFFFF) == 2
              execute: |
                // Init AP Transfer Mode, Transaction Counter, and Lane Mask (Normal Transfer Mode, Include all Byte Lanes)
                WriteDP(DP_CTRL_STAT, 0x50000F00);
                // Clear WDATAERR, STICKYORUN, STICKYCMP, and STICKYERR bits of CTRL/STAT Register by write to ABORT register
                WriteDP(SW_DP_ABORT, 0x0000001E);
        - if: (__connection & 3) == 2
          execute: |
            // Prepare MCU for flash operations
            Sequence("FlashPreparation");
        - if: (__connection & 3) == 1
          execute: |
            // Checking core readiness for debugging
            Sequence("DebuggingReadiness");
        - execute: |
            // Print device info
            Sequence("PrintDeviceInfo");
    - name: FlashPreparation
      blocks:
        - if: __ap == 2
          execute: |
            // Use CM0+ ap for nested sequences
            __ap = 1;
            Sequence("PrepareCM0");
            Sequence("PowerUpCM4");
    - name: DebuggingReadiness
      blocks:
        - if: __ap == 1
          execute: |
            Sequence("PowerUpCM4");
        - if: __ap == 2
          execute: |
            // Use CM0+ ap for nested sequences
            __ap = 1;
            Sequence("CheckPowerCM4");
    - name: PrepareCM0
      blocks:
        - execute: |
            __var WFI_LOOP_ADDR = 0x08000000 + 0x800;
            __var CM0_SP_ADDR = WFI_LOOP_ADDR + 0x40;
            // Halt CM0+
            Write32(0xE000EDF0, 0xA05F0003);
        - info: Wait for core halts
          while: (Read32(0xE000EDF0) & 0x00030000) != 0x00030000
          timeout: 1000000
        - execute: |
            // Write WFI loop in RAM
            Write32(WFI_LOOP_ADDR, 0xE7FDBF30);
            // Set VECTCLRACTIVE in AIRCR for CM0+
            Write32(0xE000ED0C, 0x05FA0002);
            // Write CM0+ xPSR
            Write32(0xE000EDF8, 0x01000000);
            Write32(0xE000EDF4, 0x00010010);
        - info: Wait for register transfer to complete
          while: (Read32(0xE000EDF0) & 0x00010000) != 0x00010000
          timeout: 1000000
        - execute: |
            // Write CM0+ CONTROL, PRIMASK
            Write32(0xE000EDF8, 0x00000000);
            Write32(0xE000EDF4, 0x00010014);
        - info: Wait for register transfer to complete
          while: (Read32(0xE000EDF0) & 0x00010000) != 0x00010000
          timeout: 1000000
        - execute: |
            // Write CM0+ PC
            Write32(0xE000EDF8, WFI_LOOP_ADDR);
            Write32(0xE000EDF4, 0x0001000F);
        - info: Wait for register transfer to complete
          while: (Read32(0xE000EDF0) & 0x00010000) != 0x00010000
          timeout: 1000000
        - execute: |
            // Write CM0+ SP
            Write32(0xE000EDF8, CM0_SP_ADDR);
            Write32(0xE000EDF4, 0x0001000D);
        - info: Wait for register transfer to complete
          while: (Read32(0xE000EDF0) & 0x00010000) != 0x00010000
          timeout: 1000000
        - execute: |
            // Write CM0+ VTOR
            Write32(0xE000ED08, 0x00000000);
            // Clear all pending interrupts in CM0+
            Write32(0xE000E280, 0x0000FFFF);
            // Enable only CM0+ IRQ0/1
            Write32(0xE000E180, 0xFFFFFFFC);
            Write32(0xE000E100, 0x00000003);
            // Set priority of IRQ0=1, IRQ1=0. Need to make sure IRQ1 is triggered even if IRQ0 is pending.
            Write32(0xE000E400, 0x00000040);
            // Release CM0+ from halt state
            Write32(0xE000EDF0, 0xA05F0001);
    - name: PowerUpCM4
      blocks:
        - execute: |
            __var CM4_PWR_CTL_ADDR = 0x40201200;
            __var CM4_PWR_CTL = Read32(CM4_PWR_CTL_ADDR);
        - if: (CM4_PWR_CTL & 0x3) != 0x3
          execute: |
            // Set power mode of CM4
            Write32(CM4_PWR_CTL_ADDR, 0x05FA0003);
            Message(0, "The power mode of Cortex-M4 core was set to ENABLED.");
    - name: CheckPowerCM4
      blocks:
        - execute: |
            __var CM4_PWR_CTL_ADDR = 0x40201200;
            __var CM4_PWR_CTL = Read32(CM4_PWR_CTL_ADDR);
        - if: (CM4_PWR_CTL & 0x3) != 0x3
          execute: |
            Message(2, "The power mode of Cortex-M4 core was NOT ENABLED by the CM0+ application. Further debugging is not possible.");


    - name: TraceStop
      blocks:
        - execute: |
            // CALL TEARDOWN OF TRACE FIRST
            Sequence("TraceStopExt");   // Add additional Trace Stop configuration if needed, e.g. to flush the ETF or TPIU FIFOs before stopping trace

    - name: TraceStartExt
      blocks:
        - execute: |
            // CoreSight Trace Component Setup
            // Temporary - Parameters, set from debugger going forward

            // TEMP_TRACEOUT: replace with __traceout when available from debugger,
            //                or move trace mode decision to new built-in variable.
            __var syncTrace   = TEMP_TRACEOUT & 0x2;
            __var bufferTrace = TEMP_TRACEOUT & 0x4;

        - if: syncTrace != 0
          execute: |
            Sequence("Configure_Funnel");
            Sequence("Configure_TPIU");

        - if: bufferTrace != 0
          execute: |
            // Configure ETB
            Sequence("Configure_Funnel");
            Sequence("Configure_ETB");

    - name: TraceStopExt
      blocks:
        - execute: |
            // CoreSight Trace Component Teardown

            // Final flush which also leaves TPIU and ETB turned off.
            Sequence("TraceFlush");

    - name: TraceCapture
      blocks:
        - execute: |
            // CoreSight Trace Component Capture Preps
            // Temporary - Parameters, set from debugger going forward

            // TEMP_TRACEOUT: replace with __traceout when available from debugger,
            //                or move trace mode decision to new built-in variable.
            __var syncTrace   = TEMP_TRACEOUT & 0x2;
            __var bufferTrace = TEMP_TRACEOUT & 0x4;

        - if: syncTrace != 0
          execute: |
            Sequence("Capture_TPIU");

        - if: bufferTrace != 0
          execute: |
            Sequence("Capture_ETB");

    - name: TraceFlush
      blocks:
        - execute: |
            // CoreSight Trace Component Flush
            // Temporary - Parameters, set from debugger going forward

            // TEMP_TRACEOUT: replace with __traceout when available from debugger,
            //                or move trace mode decision to new built-in variable.
            __var syncTrace   = TEMP_TRACEOUT & 0x2;
            __var bufferTrace = TEMP_TRACEOUT & 0x4;

        - if: syncTrace != 0
          execute: |
            Sequence("Flush_TPIU");

        - if: bufferTrace != 0
          execute: |
            Sequence("Flush_ETB");

# TRC Funnel
    - name: Configure_Funnel
      blocks:
      - execute: |
          // Helper variables
          __var savedAP    = __ap;
          __var value      = 0x00000000;

          Message(0, "Begin ConfigureFunnel @0x%08X, AP 0x%08X", FUNNEL_ADDRESS, FUNNEL_AP);

          __ap = FUNNEL_AP; // Set AP

          value = Read32(FUNNEL_ADDRESS + 0x000);
          value &= ~0xFF;              // Clear existing funnel input enables, keep hold time
          value |= FUNNEL_INPUT_MASK;  // Keep hold time as is for now, could be made configurable if needed

      - execute: |
          Write32(FUNNEL_ADDRESS + 0x000, value); // Configure CoreSight Trace Funnel to enable selected trace sources

          __ap = savedAP;
          Message(0, "End Configure_Funnel @0x%08X, AP 0x%08X", FUNNEL_ADDRESS, FUNNEL_AP);

# TRC TPIU
    - name: Flush_TPIU
      blocks:
        - execute: |
            // Helper variables
            __var savedAP     = __ap;
            __var ffcrValue   = 0x00000000;
            __var ffsrValue   = 0x00000000;

            Message(0, "Begin Flush_TPIU @0x%08X, AP 0x%08X", TPIU_ADDRESS, TPIU_AP);
            
            __ap = TPIU_AP;  // Set AP

        - execute: |
            // Configure "local" TPIU for Sync Trace
            ffsrValue = Read32(TPIU_ADDRESS + 0x300);
        - if: ffsrValue & 0x2 == 0
          info: "Formatter not stopped, do it now"
          blocks:

          - execute: |
              // Flush the TPIU formatter so pending packets leave the trace port.
              ffcrValue = Read32(TPIU_ADDRESS + 0x304);
              ffcrValue &= ~(0x00001040); // Clear StopOnFlush and FlushOnManual
              ffcrValue |= 0x00001000;    // Stop after the manual flush completes
              Write32(TPIU_ADDRESS + 0x304, ffcrValue);
              ffcrValue |= 0x00000040;    // Trigger manual flush
              Write32(TPIU_ADDRESS + 0x304, ffcrValue);

          - execute: |
              ffcrValue = Read32(TPIU_ADDRESS + 0x304);
          - while: (ffcrValue & 0x40) != 0
            info: "Wait for TPIU manual flush to complete"
            timeout: 100
            blocks:
              - execute: |
                  ffcrValue = Read32(TPIU_ADDRESS + 0x304);

          - execute: |
              ffsrValue = Read32(TPIU_ADDRESS + 0x300);
          - while: (ffsrValue & 0x1) != 0
            info: "Wait for TPIU flush in progress to clear"
            timeout: 100
            blocks:
              - execute: |
                  ffsrValue = Read32(TPIU_ADDRESS + 0x300);

        - execute: |
            __ap = savedAP;
            Message(0, "End Flush_TPIU @0x%08X, AP 0x%08X", TPIU_ADDRESS, TPIU_AP);

    - name: Configure_TPIU
      blocks:
          - execute: |
                // Temporary - Parameters, set from debugger going forward

                // TEMP_TRACEOUT: replace with __traceout when available from debugger,
                //                or move trace mode decision to new built-in variable.
                __var syncTrace   = TEMP_TRACEOUT & 0x2;
                __var bufferTrace = TEMP_TRACEOUT & 0x4;
                __var tracePortWidth = (TEMP_TRACEOUT >> 16) & 0x3F; // Parallel trace port size

                // Helper variables
                __var LAR_KEY   = 0xC5ACCE55;
                __var savedAP = __ap;

                Message(0, "Begin Configure_TPIU @0x%08X, AP 0x%08X", TPIU_ADDRESS, TPIU_AP);

                __ap = TPIU_AP; // Set AP

          - if: syncTrace != 0
            blocks:
              - execute: |
                  Write32(TPIU_ADDRESS + 0xFB0, LAR_KEY);        // TODO: Double-check if still necessary
                  Write32(TPIU_ADDRESS + 0x010, TPIU_PRESCALER); // TPIU Asynchronous Clock Prescaler Register: No prescaling
                  Write32(TPIU_ADDRESS + 0x004, 1 << (tracePortWidth - 1));  // TPIU Current Synchronous Port Width
                  Write32(TPIU_ADDRESS + 0x0F0, 0x00000000);     // TPIU Selected Pin Protocol Register: Select Sync Trace Port
                  ffcrValue  = Read32(TPIU_ADDRESS + 0x304);
                  ffcrValue |= 0x00000002;                    // Enable formatter
                  Write32(TPIU_ADDRESS + 0x304, ffcrValue);      // TPIU FFCR

          - execute: |
                __ap = savedAP;
                Message(0, "End Configure_TPIU @0x%08X, AP 0x%08X", TPIU_ADDRESS, TPIU_AP);

    - name: TraceCapture_TPIU
      blocks:
      - execute: |
          // Helper variables
          __var LAR_KEY   = 0xC5ACCE55;
          __var savedAP = __ap;

          Message(0, "Begin TraceCapture_TPIU @0x%08X, AP 0x%08X", TPIU_ADDRESS, TPIU_AP);

          // Ensure involved components are in a well-defined state.
          Sequence("TraceFlush");

          // Configure TPIU if needed and enable formatter
          __ap = TPIU_AP; // Set AP
          ffcrValue  = Read32(TPIU_ADDRESS + 0x304);
          ffcrValue |= 0x00000002;                                // Enable formatter
          Write32(TPIU_ADDRESS + 0x304, ffcrValue);                  // TPIU FFCR
          __ap = savedAP;
          Message(0, "End TraceCapture_TPIU @0x%08X, AP 0x%08X", TPIU_ADDRESS, TPIU_AP);

# TRC ETB
    - name: Flush_ETB
      blocks:
        - execute: |
            // Helper variables
            __var savedAP     = __ap;
            __var ffcrValue   = 0x00000000;
            __var etbStatus   = 0x00000000;

            Message(0, "Begin Flush_ETB @0x%08X, AP 0x%08X", ETB_ADDRESS, ETB_AP);

            __ap = ETB_AP; // Set AP

        - execute: |
            // Flush ETB first
            ffcrValue = Read32(ETB_ADDRESS + 0x304);
            ffcrValue &= ~(0x00001040); // Clear StopOnFlush and FlushOnManual
            ffcrValue |= 0x00001000;    // Stop after the manual flush completes
            Write32(ETB_ADDRESS + 0x304, ffcrValue);
            ffcrValue |= 0x00000040;    // Trigger manual flush
            Write32(ETB_ADDRESS + 0x304, ffcrValue);

        - execute: |
            ffcrValue = Read32(ETB_ADDRESS + 0x304);
        - while: (ffcrValue & 0x40) != 0
          info: "Wait for ETB manual flush to complete"
          timeout: 100
          blocks:
            - execute: |
                ffcrValue = Read32(ETB_ADDRESS + 0x304);

        - execute: |
            etbStatus = Read32(ETB_ADDRESS + 0x00C);
        - while: (etbStatus & 0x4) == 0
          info: "Wait for ETB to become ready"
          timeout: 100
          blocks:
            - execute: |
                etbStatus = Read32(ETB_ADDRESS + 0x00C);

        - execute: |
            // Disable ETB after flush until next run/step
            Write32(ETB_ADDRESS + 0x020, 0x00000000);
            etbStatus = Read32(ETB_ADDRESS + 0x00C);
        - while: (etbStatus & 0x4) == 0
          info: "Wait for AcqComp"
          timeout: 100
          blocks:
            - execute: |
                etbStatus = Read32(ETB_ADDRESS + 0x00C);

        - execute: |
            __ap = savedAP;
            Message(0, "End Flush_ETB @0x%08X, AP 0x%08X", ETB_ADDRESS, ETB_AP);

    - name: Configure_ETB
      blocks:
      - execute: |
            // Helper variables
            __var savedAP = __ap;
            __var ffcrValue = 0x00000000;
            __var etbStatus = 0x00000000;

            Message(0, "Begin Configure_ETB @0x%08X, AP 0x%08X", ETB_ADDRESS, ETB_AP);
            __ap = ETB_AP; // Set AP

            // Configure ETB
            Write32(ETB_ADDRESS + 0x020, 0x00000000);  // Disable ETB before configuring
            etbStatus = Read32(ETB_ADDRESS + 0x00C);
      - while: (etbStatus & 0x4) == 0
        info: "Wait for AcqComp"
        timeout: 100
        blocks:
          - execute: |
              etbStatus = Read32(ETB_ADDRESS + 0x00C);

      - execute: |
          // Configure
          Write32(ETB_ADDRESS + 0x304, 0x00000003);  // FFCR: Enable Formatter and Trigger Insertion
          Write32(ETB_ADDRESS + 0x01C, ETB_TRIGGER_COUNT); // TRG: Number of words to capture after trigger
          Write32(ETB_ADDRESS + 0x018, 0x00000000);  // Init RwP
          Write32(ETB_ADDRESS + 0x014, 0x00000000);  // Init RRP

          Write32(ETB_ADDRESS + 0x020, 0x00000001);  // Enable ETB

      - execute: |
          __ap = savedAP;
          Message(0, "End Configure_ETB @0x%08X, AP 0x%08X", ETB_ADDRESS, ETB_AP);
    
    - name: TraceCapture_ETB
      blocks:
      - execute: |
          // Helper variables
          __var ffcrValue = 0x00000000;
          __var savedAP = __ap;

          Message(0, "Begin TraceCapture_ETB @0x%08X, AP 0x%08X", ETB_ADDRESS, ETB_AP);

          // Ensure involved components are in a well-defined state.
          Sequence("TraceFlush");

          __ap = ETB_AP; // Set AP
          ffcrValue  = Read32(ETB_ADDRESS + 0x304);
          ffcrValue |= 0x00000002;               // FFCR: Enable Formatter
          Write32(ETB_ADDRESS + 0x304, ffcrValue);
          Write32(ETB_ADDRESS + 0x01C, ETB_TRIGGER_COUNT); // TRG: Number of words to capture after trigger
          Write32(ETB_ADDRESS + 0x018, 0x00000000);  // Init RwP
          Write32(ETB_ADDRESS + 0x014, 0x00000000);  // Init RRP
          Write32(ETB_ADDRESS + 0x020, 0x00000001);  // Enable ETB
          __ap = savedAP;

          Message(0, "End TraceCapture_ETB @0x%08X, AP 0x%08X", ETB_ADDRESS, ETB_AP);


