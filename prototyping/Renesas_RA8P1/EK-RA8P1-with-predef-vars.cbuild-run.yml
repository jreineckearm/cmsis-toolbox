      __var TRACE_PORT_PRESCALER = 0;   // Manual override for trace port prescaler. !! This is the value to program into TPIU + 1, if 0 then no manual override.
      __var TRACE_BUFFER_SYNCCNT = 0xA; // TODO: Good default!!

      // Custom variables for RA8P1 debug & trace configuration
      __var ENABLE_TRACE_CPU0 = 1;
      __var ENABLE_TRACE_CPU1 = 0;
      __var TRCK_PRESCALER = 2; // Device specific
      __var TRC_PIN_DRIVER_SPEED = 0 // Device specific: 0=Low, 1=Middle, 2=High-Speed high-drive, 3=High

      // TODO: TPIU PIN CONFIGURATION (ALTERNATE FUNCTION + PULL-UP/DRIVE SETTINGS, ETC)
      //       SEE PmnPFS/PmnPFS_HA/PmnPFS_BY , chapter 21.2.5 in RA8P1 manual.
