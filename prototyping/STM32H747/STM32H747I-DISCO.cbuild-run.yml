            __var ffcrValue   = 0x00000000;
            __var etfStatus   = 0x00000000;

            Message(0, "Begin Flush_ETF_0 @0x%08X, AP 0x%08X", ETF_ADDRESS_0, ETF_AP_0);

            __ap = ETF_AP_0; // Set AP

        - execute: |
            // Flush ETF first so the HW FIFO drains towards the TPIU.
            ffcrValue = Read32(ETF_ADDRESS_0 + 0x304);
            ffcrValue &= ~(0x00001040); // Clear StopOnFlush and FlushOnManual
            ffcrValue |= 0x00001000;    // Stop after the manual flush completes
            Write32(ETF_ADDRESS_0 + 0x304, ffcrValue);
            ffcrValue |= 0x00000040;    // Trigger manual flush
            Write32(ETF_ADDRESS_0 + 0x304, ffcrValue);

        - execute: |
            ffcrValue = Read32(ETF_ADDRESS_0 + 0x304);
        - while: (ffcrValue & 0x40) != 0
          info: "Wait for ETF manual flush to complete"
          timeout: 100
          blocks:
            - execute: |
                ffcrValue = Read32(ETF_ADDRESS_0 + 0x304);

        - execute: |
            etfStatus = Read32(ETF_ADDRESS_0 + 0x00C);
        - while: (etfStatus & 0x4) == 0
          info: "Wait for ETF to become ready"
          timeout: 100
          blocks:
            - execute: |
                etfStatus = Read32(ETF_ADDRESS_0 + 0x00C);

        - execute: |
            // Disable ETF after flush until next run/step
            Write32(ETF_ADDRESS_0 + 0x020, 0x00000000);
            etfStatus = Read32(ETF_ADDRESS_0 + 0x00C);
        - while: (etfStatus & 0x4) == 0
          info: "Wait for TMCReady"
          timeout: 100
          blocks:
            - execute: |
                etfStatus = Read32(ETF_ADDRESS_0 + 0x00C);

        - execute: |
            __ap = savedAP;
            Message(0, "End Flush_ETF_0 @0x%08X, AP 0x%08X", ETF_ADDRESS_0, ETF_AP_0);

    - name: Flush_TPIU_0
      blocks:
        - execute: |
            // Helper variables
            __var savedAP     = __ap;
            __var ffcrValue   = 0x00000000;
            __var ffsrValue   = 0x00000000;

            Message(0, "Begin Flush_TPIU_0 @0x%08X, AP 0x%08X", TPIU_ADDRESS_0, TPIU_AP_0);
            
            __ap = TPIU_AP_0;  // Set AP

        - execute: |
            // Configure "local" TPIU for Sync Trace
            ffsrValue = Read32(TPIU_ADDRESS_0 + 0x300);
        - if: ffsrValue & 0x2 == 0
          info: "Formatter not stopped, do it now"
          blocks:

          - execute: |
              // Flush the TPIU formatter so pending packets leave the trace port.
              ffcrValue = Read32(TPIU_ADDRESS_0 + 0x304);
              ffcrValue &= ~(0x00001040); // Clear StopOnFlush and FlushOnManual
              ffcrValue |= 0x00001000;    // Stop after the manual flush completes
              Write32(TPIU_ADDRESS_0 + 0x304, ffcrValue);
              ffcrValue |= 0x00000040;    // Trigger manual flush
              Write32(TPIU_ADDRESS_0 + 0x304, ffcrValue);

          - execute: |
              ffcrValue = Read32(TPIU_ADDRESS_0 + 0x304);
          - while: (ffcrValue & 0x40) != 0
            info: "Wait for TPIU manual flush to complete"
            timeout: 100
            blocks:
              - execute: |
                  ffcrValue = Read32(TPIU_ADDRESS_0 + 0x304);

          - execute: |
              ffsrValue = Read32(TPIU_ADDRESS_0 + 0x300);
          - while: (ffsrValue & 0x1) != 0
            info: "Wait for TPIU flush in progress to clear"
            timeout: 100
            blocks:
              - execute: |
                  ffsrValue = Read32(TPIU_ADDRESS_0 + 0x300);

        - execute: |
            __ap = savedAP;
            Message(0, "End Flush_TPIU_0 @0x%08X, AP 0x%08X", TPIU_ADDRESS_0, TPIU_AP_0);

    - name: Configure_CPUTrace
      blocks:
        - execute: |
            __var DEMCR_Address = 0xE000EDFC;
            Message(0, "Begin Configure_CPUTrace @0x%08X", DEMCR_Address);
            Write32(DEMCR_Address, Read32(DEMCR_Address) | 0x01000000);
            Message(0, "End Configure_CPUTrace @0x%08X", DEMCR_Address);

    - name: Configure_Funnel_0
      blocks:
      - execute: |
          // Helper variables
          __var savedAP    = __ap;
          __var value      = 0x00000000;

          Message(0, "Begin Configure_Funnel_0 @0x%08X, AP 0x%08X", FUNNEL_ADDRESS_0, FUNNEL_AP_0);

          __ap = FUNNEL_AP_0; // Set AP

          value = Read32(FUNNEL_ADDRESS_0 + 0x000);
          value &= ~0xFF;                // Clear existing funnel input enables, keep hold time
          value |= FUNNEL_INPUT_MASK_0;  // Keep hold time as is for now, could be made configurable if needed

      - execute: |
          Write32(FUNNEL_ADDRESS_0 + 0x000, value); // Configure CoreSight Trace Funnel to enable selected trace sources

          __ap = savedAP;
          Message(0, "End Configure_Funnel_0 @0x%08X, AP 0x%08X", FUNNEL_ADDRESS_0, FUNNEL_AP_0);

    - name: Configure_Funnel_1
      blocks:
      - execute: |
          // Helper variables
          __var savedAP    = __ap;
          __var value      = 0x00000000;

          Message(0, "Begin Configure_Funnel_1 @0x%08X, AP 0x%08X", FUNNEL_ADDRESS_1, FUNNEL_AP_1);

            __ap = FUNNEL_AP_1; // Set AP
            value = Read32(FUNNEL_ADDRESS_1 + 0x000);
            value &= ~0xFF;                // Clear existing funnel input enables, keep hold time
            value |= FUNNEL_INPUT_MASK_1;  // Keep hold time as is for now, could be made configurable if needed

      - execute: |
          Write32(FUNNEL_ADDRESS_1 + 0x000, value); // Configure CoreSight Trace Funnel to enable selected trace sources

          __ap = savedAP;
          Message(0, "End Configure_Funnel_1 @0x%08X, AP 0x%08X", FUNNEL_ADDRESS_1, FUNNEL_AP_1);

    - name: Configure_ETF_0_HWFIFO
      blocks:
      - execute: |
            // Helper variables
            __var savedAP = __ap;
            __var ffcrValue = 0x00000000;
            __var etfStatus = 0x00000000;

            Message(0, "Begin Configure_TMC_ETF_HWFIFO @0x%08X, AP 0x%08X", ETF_ADDRESS_0, ETF_AP_0);
            __ap = ETF_AP_0; // Set AP

            // Configure ETF to HW FIFO for Sync Trace
            Write32(ETF_ADDRESS_0 + 0x020, 0x00000000);  // Disable ETF before configuring
            etfStatus = Read32(ETF_ADDRESS_0 + 0x00C);
      - while: (etfStatus & 0x4) == 0
        info: "Wait for TMCReady"
        timeout: 100
        blocks:
          - execute: |
              etfStatus = Read32(ETF_ADDRESS_0 + 0x00C);

      - execute: |
          // Configure
          Write32(ETF_ADDRESS_0 + 0x028, 0x00000002); // Set HW FIFO Mode
          Write32(ETF_ADDRESS_0 + 0x034, 0x00000000); // Watermark: Set threshold vacancy to 0 to use full buffer
          Write32(ETF_ADDRESS_0 + 0x304, 0x00000003); // FFCR: Enable Formatter and Trigger Insertion
          Write32(ETF_ADDRESS_0 + 0x308, 0x00000000); // Clear PSCR, use other components for periodic sync requests

          Write32(ETF_ADDRESS_0 + 0x020, 0x00000001); // Enable ETF

      - execute: |
          __ap = savedAP;
          Message(0, "End Configure_TMC_ETF_HWFIFO @0x%08X, AP 0x%08X", ETF_ADDRESS_0, ETF_AP_0);

    - name: Configure_ETF_0_CircularBuffer
      blocks:
      - execute: |
            // Helper variables
            __var savedAP = __ap;
            __var ffcrValue = 0x00000000;
            __var etfStatus = 0x00000000;

            Message(0, "Begin Configure_TMC_ETF_CircularBuffer @0x%08X, AP 0x%08X", ETF_ADDRESS_0, ETF_AP_0);
            __ap = ETF_AP_0; // Set AP

            // Configure ETF to HW FIFO for Sync Trace
            Write32(ETF_ADDRESS_0 + 0x020, 0x00000000);  // Disable ETF before configuring
            etfStatus = Read32(ETF_ADDRESS_0 + 0x00C);
      - while: (etfStatus & 0x4) == 0
        info: "Wait for TMCReady"
        timeout: 100
        blocks:
          - execute: |
              etfStatus = Read32(ETF_ADDRESS_0 + 0x00C);

      - execute: |
          // Configure
          Write32(ETF_ADDRESS_0 + 0x028, 0x00000000); // Set Circular Buffer mode
          Write32(ETF_ADDRESS_0 + 0x034, 0x00000000); // Watermark: Set threshold vacancy to 0 to use full buffer
          Write32(ETF_ADDRESS_0 + 0x304, 0x00000003); // FFCR: Enable Formatter and Trigger Insertion
          Write32(ETF_ADDRESS_0 + 0x308, TRACE_BUFFER_SYNCCNT); // Set PSCR
          Write32(ETF_ADDRESS_0 + 0x014, 0x00000000); // Init RRP
          Write32(ETF_ADDRESS_0 + 0x018, 0x00000000); // Init RwP

          Write32(ETF_ADDRESS_0 + 0x020, 0x00000001); // Enable ETF

      - execute: |
          __ap = savedAP;
          Message(0, "End Configure_TMC_ETF_CircularBuffer @0x%08X, AP 0x%08X", ETF_ADDRESS_0, ETF_AP_0);
    
    - name: Configure_SWO
      blocks:
      - execute: |
          Message(0, "Begin Configure_SWO");
          Sequence("Configure_Funnel_1");
          Message(0, "End Configure_SWO");

    - name: Configure_SyncTrace
      blocks:
      - execute: |
          Message(0, "Begin Configure_SyncTrace");
          Sequence("Flush_TPIU_0");
          Sequence("Configure_Funnel_0");
          Sequence("Configure_ETF_0_HWFIFO");
          Message(0, "End Configure_SyncTrace");
  
    - name: Configure_TraceBuffer
      blocks:
      - execute: |
          Message(0, "Begin Configure_TraceBuffer");
          Sequence("Configure_Funnel_0");
          Sequence("Configure_ETF_0_CircularBuffer");
          Message(0, "End Configure_TraceBuffer");

    - name: TraceCapture_TPIU_0
      blocks:
      - execute: |
          // Helper variables
          __var LAR_KEY   = 0xC5ACCE55;
          __var savedAP = __ap;

          Message(0, "Begin TraceCapture_TPIU_0 @0x%08X, AP 0x%08X", TPIU_ADDRESS_0, TPIU_AP_0);

          // Ensure involved components are in a well-defined state.
          Sequence("TraceFlush");

          // Configure TPIU if needed and enable formatter
          __ap = TPIU_AP_0; // Set AP
          ffcrValue  = Read32(TPIU_ADDRESS_0 + 0x304);
          ffcrValue |= 0x00000002;                                // Enable formatter
          Write32(TPIU_ADDRESS_0 + 0x304, ffcrValue);                  // TPIU FFCR
          __ap = savedAP;
          Message(0, "End TraceCapture_TPIU_0 @0x%08X, AP 0x%08X", TPIU_ADDRESS_0, TPIU_AP_0);

    - name: TraceCapture_ETF_0_CircularBuffer
      blocks:
      - execute: |
          // Helper variables
          __var ffcrValue = 0x00000000;
          __var savedAP = __ap;

          Message(0, "Begin TraceCapture_ETF_0_CircularBuffer @0x%08X, AP 0x%08X", ETF_ADDRESS_0, ETF_AP_0);

          // Ensure involved components are in a well-defined state.
          Sequence("TraceFlush");

          __ap = ETF_AP_0; // Set AP
          ffcrValue  = Read32(ETF_ADDRESS_0 + 0x304);
          ffcrValue |= 0x00000002;               // FFCR: Enable Formatter
          Write32(ETF_ADDRESS_0 + 0x304, ffcrValue);
          Write32(ETF_ADDRESS_0 + 0x308, TRACE_BUFFER_SYNCCNT); // Set PSCR
          Write32(ETF_ADDRESS_0 + 0x014, 0x00000000); // Init RRP
          Write32(ETF_ADDRESS_0 + 0x018, 0x00000000); // Init RwP
          Write32(ETF_ADDRESS_0 + 0x020, 0x00000001); // Enable ETF
          __ap = savedAP;

          Message(0, "End TraceCapture_ETF_0_CircularBuffer @0x%08X, AP 0x%08X", ETF_ADDRESS_0, ETF_AP_0);

    - name: TraceStartExt
      blocks:
      - execute: |
          // TEMP_TRACEOUT: replace with __traceout when available from debugger,
          //                or move trace mode decision to new built-in variable.
          __var swoTrace    = TEMP_TRACEOUT & 0x1;
          __var syncTrace   = TEMP_TRACEOUT & 0x2;
          __var bufferTrace = TEMP_TRACEOUT & 0x4;

          Message(0, "Begin TraceStart");

          Sequence("Configure_CPUTrace");

      - if: swoTrace != 0
        blocks:
          - execute: |
              Sequence("Configure_SWO");

      - if: syncTrace != 0
        blocks:
          - execute: |
              Sequence("Configure_SyncTrace");

      - if: bufferTrace != 0
        blocks:
          - execute: |
              Sequence("Configure_TraceBuffer");

      - execute: |
          Message(0, "End TraceStart sequence");

    - name: TraceStopExt
      blocks:
      - execute: |
          // TEMP_TRACEOUT: replace with __traceout when available from debugger,
          //                or move trace mode decision to new built-in variable.
          __var swoTrace    = TEMP_TRACEOUT & 0x1;
          __var syncTrace   = TEMP_TRACEOUT & 0x2;
          __var bufferTrace = TEMP_TRACEOUT & 0x4;

          Message(0, "Begin TraceStop");

      - if: swoTrace != 0
        blocks:
          - execute: |
              // Add device specific stop for SWO trace if needed.
              // Turn off funnels?

      - if: syncTrace != 0 || bufferTrace != 0
        blocks:
          - execute: |
              // Final flush which also leaves TPIU and/or ETF turned off.
              Sequence("TraceFlush");

      - execute: |
          Message(0, "End TraceStop sequence");

    - name: TraceCapture
      blocks:
      - execute: |
          // TEMP_TRACEOUT: replace with __traceout when available from debugger,
          //                or move trace mode decision to new built-in variable.
          __var swoTrace    = TEMP_TRACEOUT & 0x1;
          __var syncTrace   = TEMP_TRACEOUT & 0x2;
          __var bufferTrace = TEMP_TRACEOUT & 0x4;

          Message(0, "Begin TraceCapture");

      - if: swoTrace != 0
        blocks:
          - execute: |
              // Normally nothing to do, SWO output always on when enabled.

      - if: syncTrace != 0
        blocks:
          - execute: |
              Sequence("TraceCapture_TPIU_0");

      - if: bufferTrace != 0
        blocks:
          - execute: |
              Sequence("TraceCapture_ETF_0_CircularBuffer");

      - execute: |
          Message(0, "End TraceCapture");

    - name: TraceFlush
      blocks:
      - execute: |
          // TEMP_TRACEOUT: replace with __traceout when available from debugger,
          //                or move trace mode decision to new built-in variable.
          __var syncTrace   = TEMP_TRACEOUT & 0x2;
          __var bufferTrace = TEMP_TRACEOUT & 0x4;

          Message(0, "Begin TraceFlush");

      - if: syncTrace != 0
        blocks:
          - execute: |
              Sequence("Flush_TPIU_0");

      - if: bufferTrace != 0
        blocks:
          - execute: |
              Sequence("Flush_ETF_0");

      - execute: |
          Message(0, "End TraceFlush");

    - name: DebugCoreStart
      blocks:
        - execute: |
            // ***** TEMPORARY, TRACE START SEQUENCE MUST BE CALLED BY DEBUGGER *****

            // ***** Default Implementation *****
            // System Control Space (SCS) offset as defined in Armv6-M/Armv7-M.
            __var SCS_Addr   = 0xE000E000;
            __var DHCSR_Addr = SCS_Addr + 0xDF0;

            Message(0, "Begin DebugCoreStart sequence");

            // Enable Core Debug via DHCSR
            Write32(DHCSR_Addr, 0xA05F0001);

            // ***** Custom Extension for Testing, TraceStart should be called from debugger *****
            // Configure core-local trace blocks only after CPU debug is enabled.
            Sequence("TraceStart");

            Sequence("TraceCapture");

            Message(0, "End DebugCoreStart sequence"); 

    - name: DebugCoreStop
      blocks:
        - execute: |
            // ***** TEMPORARY, TRACE STOP SEQUENCE MUST BE CALLED BY DEBUGGER *****

            // ***** Default Implementation *****
            // System Control Space (SCS) offset as defined in Armv6-M/Armv7-M.
            __var SCS_Addr   = 0xE000E000;
            __var DHCSR_Addr = SCS_Addr + 0xDF0;
            __var DEMCR_Addr = SCS_Addr + 0xDFC;

            Message(0, "Begin DebugCoreStop sequence");

            // Disable Core Debug via DHCSR
            Write32(DHCSR_Addr, 0xA05F0000);

            // Disable DWT and ITM blocks, DebugMonitor handler,
            // halting debug traps, and Reset Vector Catch.
            Write32(DEMCR_Addr, 0x00000000);

            // ***** Custom Extension for Testing, TraceStop should be called from debugger *****
            Sequence("TraceFlush");
            // Configure core-local trace blocks only after CPU debug is enabled.
            Sequence("TraceStop");

            Message(0, "End DebugCoreStop sequence"); 



