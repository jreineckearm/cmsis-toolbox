# ETF Component Snippets

    - debug-vars:
      vars: |
        // ETF
        __var ETF_ADDRESS       = 0x00000000;
        __var ETF_AP            = 0x00000000;
        __var ETF_SYNCCNT       = 0xA; // TODO: DEFAULT
        __var ETF_TRIGGER_COUNT = 0x0;

    - name: Flush_ETF
      blocks:
        - execute: |
            // Helper variables
            __var savedAP     = __ap;
            __var ffcrValue   = 0x00000000;
            __var etfStatus   = 0x00000000;

            Message(0, "Begin Flush_ETF @0x%08X, AP 0x%08X", ETF_ADDRESS, ETF_AP);

            __ap = ETF_AP; // Set AP

        - execute: |
            // Flush ETF first so the HW FIFO drains towards the TPIU.
            ffcrValue = Read32(ETF_ADDRESS + 0x304);
            ffcrValue &= ~(0x00001040); // Clear StopOnFlush and FlushOnManual
            ffcrValue |= 0x00001000;    // Stop after the manual flush completes
            Write32(ETF_ADDRESS + 0x304, ffcrValue);
            ffcrValue |= 0x00000040;    // Trigger manual flush
            Write32(ETF_ADDRESS + 0x304, ffcrValue);

        - execute: |
            ffcrValue = Read32(ETF_ADDRESS + 0x304);
        - while: (ffcrValue & 0x40) != 0
          info: "Wait for ETF manual flush to complete"
          timeout: 100
          blocks:
            - execute: |
                ffcrValue = Read32(ETF_ADDRESS + 0x304);

        - execute: |
            etfStatus = Read32(ETF_ADDRESS + 0x00C);
        - while: (etfStatus & 0x4) == 0
          info: "Wait for ETF to become ready"
          timeout: 100
          blocks:
            - execute: |
                etfStatus = Read32(ETF_ADDRESS + 0x00C);

        - execute: |
            // Disable ETF after flush until next run/step
            Write32(ETF_ADDRESS + 0x020, 0x00000000);
            etfStatus = Read32(ETF_ADDRESS + 0x00C);
        - while: (etfStatus & 0x4) == 0
          info: "Wait for TMCReady"
          timeout: 100
          blocks:
            - execute: |
                etfStatus = Read32(ETF_ADDRESS + 0x00C);

        - execute: |
            __ap = savedAP;
            Message(0, "End Flush_ETF @0x%08X, AP 0x%08X", ETF_ADDRESS, ETF_AP);

    - name: Configure_ETF_HWFIFO
      blocks:
      - execute: |
            // Helper variables
            __var savedAP = __ap;
            __var ffcrValue = 0x00000000;
            __var etfStatus = 0x00000000;

            Message(0, "Begin Configure_ETF_HWFIFO @0x%08X, AP 0x%08X", ETF_BASE, ETF_AP);
            __ap = ETF_AP; // Set AP

            // Configure ETF to HW FIFO for Sync Trace
            Write32(ETF_ADDRESS + 0x020, 0x00000000);  // Disable ETF before configuring
            etfStatus = Read32(ETF_ADDRESS + 0x00C);
      - while: (etfStatus & 0x4) == 0
        info: "Wait for TMCReady"
        timeout: 100
        blocks:
          - execute: |
              etfStatus = Read32(ETF_ADDRESS + 0x00C);

      - execute: |
          // Configure
          Write32(ETF_ADDRESS + 0x028, 0x00000002); // Set HW FIFO Mode
          Write32(ETF_ADDRESS + 0x034, 0x00000000); // Watermark: Set threshold vacancy to 0 to use full buffer
          Write32(ETF_ADDRESS + 0x304, 0x00000003); // FFCR: Enable Formatter and Trigger Insertion
          Write32(ETF_ADDRESS + 0x308, 0x00000000); // Clear PSCR, use other components for periodic sync requests

          Write32(ETF_ADDRESS + 0x020, 0x00000001); // Enable ETF

      - execute: |
          __ap = savedAP;
          Message(0, "End Configure_ETF_HWFIFO @0x%08X, AP 0x%08X", ETF_ADDRESS, ETF_AP);

    - name: Configure_ETF_CircularBuffer
      blocks:
      - execute: |
            // Helper variables
            __var savedAP = __ap;
            __var ffcrValue = 0x00000000;
            __var etfStatus = 0x00000000;

            Message(0, "Begin Configure_ETF_CircularBuffer @0x%08X, AP 0x%08X", ETF_ADDRESS, ETF_AP);
            __ap = ETF_AP; // Set AP

            // Configure ETF to HW FIFO for Sync Trace
            Write32(ETF_ADDRESS + 0x020, 0x00000000);  // Disable ETF before configuring
            etfStatus = Read32(ETF_ADDRESS + 0x00C);
      - while: (etfStatus & 0x4) == 0
        info: "Wait for TMCReady"
        timeout: 100
        blocks:
          - execute: |
              etfStatus = Read32(ETF_ADDRESS + 0x00C);

      - execute: |
          // Configure
          Write32(ETF_ADDRESS + 0x028, 0x00000000);  // Set Circular Buffer mode
          Write32(ETF_ADDRESS + 0x034, 0x00000000);  // Watermark: Set threshold vacancy to 0 to use full buffer
          Write32(ETF_ADDRESS + 0x304, 0x00000003);  // FFCR: Enable Formatter and Trigger Insertion
          Write32(ETF_ADDRESS + 0x01C, ETF_TRIGGER_COUNT); // TRG: Number of words to capture after trigger
          Write32(ETF_ADDRESS + 0x308, ETF_SYNCCNT); // Set PSCR
          Write32(ETF_ADDRESS + 0x018, 0x00000000);  // Init RwP
          Write32(ETF_ADDRESS + 0x014, 0x00000000);  // Init RRP

          Write32(ETF_ADDRESS + 0x020, 0x00000001);  // Enable ETF

      - execute: |
          __ap = savedAP;
          Message(0, "End Configure_ETF_CircularBuffer @0x%08X, AP 0x%08X", ETF_ADDRESS, ETF_AP);
    
    - name: TraceCapture_ETF_CircularBuffer
      blocks:
      - execute: |
          // Helper variables
          __var ffcrValue = 0x00000000;
          __var savedAP = __ap;

          Message(0, "Begin TraceCapture_ETF_CircularBuffer @0x%08X, AP 0x%08X", ETF_ADDRESS, ETF_AP);

          // Ensure involved components are in a well-defined state.
          Sequence("TraceFlush");

          __ap = ETF_AP; // Set AP
          ffcrValue  = Read32(ETF_ADDRESS + 0x304);
          ffcrValue |= 0x00000002;               // FFCR: Enable Formatter
          Write32(ETF_ADDRESS + 0x304, ffcrValue);
          Write32(ETF_ADDRESS + 0x01C, ETF_TRIGGER_COUNT); // TRG: Number of words to capture after trigger
          Write32(ETF_ADDRESS + 0x308, ETF_SYNCCNT); // Set PSCR
          Write32(ETF_ADDRESS + 0x018, 0x00000000);  // Init RwP
          Write32(ETF_ADDRESS + 0x014, 0x00000000);  // Init RRP
          Write32(ETF_ADDRESS + 0x020, 0x00000001);  // Enable ETF
          __ap = savedAP;

          Message(0, "End TraceCapture_ETF_CircularBuffer @0x%08X, AP 0x%08X", ETF_ADDRESS, ETF_AP);

# ETR + CATU Component Snippets

    - debug-vars:
      vars: |
        // ETR
        __var ETR_ADDRESS           = 0x00000000;
        __var ETR_AP                = 0x00000000;
        __var ETR_SYNCCNT           = 0xA; // TODO: DEFAULT
        __var ETR_TRIGGER_COUNT     = 0x0;
        __var ETR_BUFFER_ADDRESS    = 0x00000000;
        __var ETR_BUFFER_ADDRESS_HI = 0x00000000;
        __var ETR_BUFFER_SIZE       = 0x00000000;
        __var ETR_AXI_CTL           = 0x00000000; // [19:16]: RCACHE encoding
                                                  // [11:8]: WrBurstLen
                                                  // [5:2]: WCACHE encoding
                                                  // [1]: Secure Access
                                                  // [0]: Privileged Access
        __var ETR_AXI_CTL1          = 0x00020000; // [27:16]: tlbXlateSlots
                                                  // [7:6]: stashMode
                                                  // [4:0]: tlbLimit

        // CATU
        // Additional settings if CATU implemented
        // TODO: Seems like better set up by target software
        __var CATU_ADDRESS             = 0x00000000;
        __var CATU_AP                  = 0x00000000;
        __var CATU_MODE                = 0x00000000;            // [0]: 1- Translate, 0 - Pass-through
        __var CATU_SCATTERLIST_ADDR    = 0x00000000;            // Lookup table in RAM for translation
        __var CATU_SCATTERLIST_ADDR_HI = 0x00000000;
        __var CATU_INPUT_ADDR          = ETR_BUFFER_ADDRESS;    // Virtual base address
        __var CATU_INPUT_ADDR_HI       = ETR_BUFFER_ADDRESS_HI;
        __var CATU_AXI_CTRL = (((ETR_AXI_CTL >> 16) & 0xF) << 4) | (ETR_AXI_CTL & 0x3); // [7:4]: ARCACHE, [1:0]: ARPROT (Secure|Privileged)
        __var CATU_IRQEN               = 0x00000000;            // [0]: Enable/Disable
        

    - name: Flush_ETR
      blocks:
        - execute: |
            // Helper variables
            __var savedAP     = __ap;
            __var ffcrValue   = 0x00000000;
            __var etrStatus   = 0x00000000;

            Message(0, "Begin Flush_ETR @0x%08X, AP 0x%08X", ETR_ADDRESS, ETR_AP);

            __ap = ETR_AP; // Set AP

        - execute: |
            // Flush ETR first so the HW FIFO drains towards the TPIU.
            ffcrValue = Read32(ETR_ADDRESS + 0x304);
            ffcrValue &= ~(0x00001040); // Clear StopOnFlush and FlushOnManual
            ffcrValue |= 0x00001000;    // Stop after the manual flush completes
            Write32(ETR_ADDRESS + 0x304, ffcrValue);
            ffcrValue |= 0x00000040;    // Trigger manual flush
            Write32(ETR_ADDRESS + 0x304, ffcrValue);

        - execute: |
            ffcrValue = Read32(ETR_ADDRESS + 0x304);
        - while: (ffcrValue & 0x40) != 0
          info: "Wait for ETR manual flush to complete"
          timeout: 100
          blocks:
            - execute: |
                ffcrValue = Read32(ETR_ADDRESS + 0x304);

        - execute: |
            etrStatus = Read32(ETR_ADDRESS + 0x00C);
        - while: (etrStatus & 0x4) == 0
          info: "Wait for ETR to become ready"
          timeout: 100
          blocks:
            - execute: |
                etrStatus = Read32(ETR_ADDRESS + 0x00C);

        - execute: |
            // Disable ETR after flush until next run/step
            Write32(ETR_ADDRESS + 0x020, 0x00000000);
            etrStatus = Read32(ETR_ADDRESS + 0x00C);
        - while: (etrStatus & 0x4) == 0
          info: "Wait for TMCReady"
          timeout: 100
          blocks:
            - execute: |
                etrStatus = Read32(ETR_ADDRESS + 0x00C);

        - execute: |
            __ap = savedAP;
            Message(0, "End Flush_ETR @0x%08X, AP 0x%08X", ETR_ADDRESS, ETR_AP);

    - name: Configure_ETR_CircularBuffer
      blocks:
      - execute: |
            // Helper variables
            __var savedAP = __ap;
            __var ffcrValue = 0x00000000;
            __var etrStatus = 0x00000000;

            Message(0, "Begin Configure_ETR_CircularBuffer @0x%08X, AP 0x%08X", ETR_ADDRESS, ETR_AP);
            __ap = ETR_AP; // Set AP

            // Configure ETR to HW FIFO for Sync Trace
            Write32(ETR_ADDRESS + 0x020, 0x00000000);  // Disable ETR before configuring
            etrStatus = Read32(ETR_ADDRESS + 0x00C);
      - while: (etrStatus & 0x4) == 0
        info: "Wait for TMCReady"
        timeout: 100
        blocks:
          - execute: |
              etrStatus = Read32(ETR_ADDRESS + 0x00C);

      - execute: |
          // Configure
          Write32(ETR_ADDRESS + 0x028, 0x00000000);             // Set Circular Buffer mode
          Write32(ETR_ADDRESS + 0x034, 0x00000000);             // Watermark: Set threshold vacancy to 0 to use full buffer
          Write32(ETR_ADDRESS + 0x304, 0x00000003);             // FFCR: Enable Formatter and Trigger Insertion
          Write32(ETR_ADDRESS + 0x01C, ETR_TRIGGER_COUNT);      // TRG: Number of words to capture after trigger
          Write32(ETR_ADDRESS + 0x308, ETR_SYNCCNT);            // Set PSCR
          Write32(ETR_ADDRESS + 0x018, ETR_BUFFER_ADDRESS);     // Init RwP
          Write32(ETR_ADDRESS + 0x014, ETR_BUFFER_ADDRESS);     // Init RRP
          Write32(ETR_ADDRESS + 0x11C, ETR_BUFFER_ADDRESS_HI);  // Init DBAHI
          Write32(ETR_ADDRESS + 0x118, ETR_BUFFER_ADDRESS);     // Init DBALO
          Write32(ETR_ADDRESS + 0x004, ETR_BUFFER_SIZE);        // Init RSZ
          Write32(ETR_ADDRESS + 0x110, ETR_AXI_CTL);            // Init AXICTL
          Write32(ETR_ADDRESS + 0xED0, ETR_AXI_CTL1);           // Init AXICTL1
          Write32(ETR_ADDRESS + 0x03C, ETR_BUFFER_ADDRESS_HI);  // Init RWPHI
          Write32(ETR_ADDRESS + 0x038, ETR_BUFFER_ADDRESS_HI);  // Init RRPHI
          Write32(ETR_ADDRESS + 0x020, 0x00000001);             // Enable ETR

      - execute: |
          __ap = savedAP;
          Message(0, "End Configure_ETR_CircularBuffer @0x%08X, AP 0x%08X", ETR_ADDRESS, ETR_AP);
    
    - name: TraceCapture_ETR_CircularBuffer
      blocks:
      - execute: |
          // Helper variables
          __var ffcrValue = 0x00000000;
          __var savedAP = __ap;

          Message(0, "Begin TraceCapture_ETR_CircularBuffer @0x%08X, AP 0x%08X", ETR_ADDRESS, ETR_AP);

          // Ensure involved components are in a well-defined state.
          Sequence("TraceFlush");

          __ap = ETR_AP; // Set AP
          ffcrValue  = Read32(ETR_ADDRESS + 0x304);
          ffcrValue |= 0x00000002;                              // FFCR: Enable Formatter
          Write32(ETR_ADDRESS + 0x304, ffcrValue);
          Write32(ETR_ADDRESS + 0x01C, ETR_TRIGGER_COUNT);      // TRG: Number of words to capture after trigger
          Write32(ETR_ADDRESS + 0x308, ETR_SYNCCNT);            // Set PSCR
          Write32(ETR_ADDRESS + 0x018, ETR_BUFFER_ADDRESS);     // Init RwP
          Write32(ETR_ADDRESS + 0x014, ETR_BUFFER_ADDRESS);     // Init RRP
          Write32(ETR_ADDRESS + 0x11C, ETR_BUFFER_ADDRESS_HI);  // Init DBAHI
          Write32(ETR_ADDRESS + 0x118, ETR_BUFFER_ADDRESS);     // Init DBALO
          Write32(ETR_ADDRESS + 0x004, ETR_BUFFER_SIZE);        // Init RSZ
          Write32(ETR_ADDRESS + 0x110, ETR_AXI_CTL);            // Init AXICTL
          Write32(ETR_ADDRESS + 0xED0, ETR_AXI_CTL1);           // Init AXICTL1
          Write32(ETR_ADDRESS + 0x03C, ETR_BUFFER_ADDRESS_HI);  // Init RWPHI
          Write32(ETR_ADDRESS + 0x038, ETR_BUFFER_ADDRESS_HI);  // Init RRPHI
          Write32(ETR_ADDRESS + 0x020, 0x00000001);             // Enable ETR
          __ap = savedAP;

          Message(0, "End TraceCapture_ETR_CircularBuffer @0x%08X, AP 0x%08X", ETR_ADDRESS, ETR_AP);

    - name: Flush_ETR_CATU
      info: "Flush any outstanding memory transactions"
      blocks:
      - execute: |
            // Helper variables
            __var savedAP = __ap;
            __var status = 0x00000000;

            Message(0, "Begin Flush_ETR_CATU @0x%08X, AP 0x%08X", CATU_ADDRESS, CATU_AP);
            __ap = CATU_AP; // Set AP

            // Disable CATU before configuration
            Write32(CATU_ADDRESS + 0x000, 0x00000000);  

            status = Read32(CATU_ADDRESS + 0x100);
      - while: (status & 0x0100) == 0
        info: "Wait for READY"
        timeout: 100
        blocks:
          - execute: |
              status = Read32(CATU_ADDRESS + 0x100);

      - execute: |
          __ap = savedAP;
          Message(0, "End Flush_ETR_CATU @0x%08X, AP 0x%08X", CATU_ADDRESS, CATU_AP);

    - name: Configure_ETR_CATU
      info: "Scatterlist expected to be programmed separately, too complex"
      blocks:
      - execute: |
            // Helper variables
            __var savedAP = __ap;
            __var status = 0x00000000;

            Message(0, "Begin Configure_ETR_CATU @0x%08X, AP 0x%08X", CATU_ADDRESS, CATU_AP);

            __ap = CATU_AP; // Set AP

            // Disable CATU before configuration
            Write32(CATU_ADDRESS + 0x000, 0x00000000);  

            status = Read32(CATU_ADDRESS + 0x100);
      - while: (status & 0x0100) == 0
        info: "Wait for READY"
        timeout: 100
        blocks:
          - execute: |
              status = Read32(CATU_ADDRESS + 0x100);

      - execute: |
          // Configure
          Write32(CATU_ADDRESS + 0x004, CATU_MODE);                 // Set MODE
          Write32(CATU_ADDRESS + 0x008, CATU_AXI_CTRL);             // Set AXICTRL
          Write32(CATU_ADDRESS + 0x00C, CATU_IRQEN);                // Set IRQEN
          Write32(CATU_ADDRESS + 0x020, CATU_SCATTERLIST_ADDR);     // Set SLADDRLO
          Write32(CATU_ADDRESS + 0x024, CATU_SCATTERLIST_ADDR_HI);  // Set SLADDRHI
          Write32(CATU_ADDRESS + 0x028, CATU_INPUT_ADDR);           // Set INADDRLO
          Write32(CATU_ADDRESS + 0x02C, CATU_INPUT_ADDR_HI);        // Set INADDRHI

          // Enable CATU after configuration
          Write32(CATU_ADDRESS + 0x000, 0x00000001);
            status = Read32(CATU_ADDRESS + 0x100);

      - while: (status & 0x0100) == 1
        info: "Wait for READY cleared"
        timeout: 100
        blocks:
          - execute: |
              status = Read32(CATU_ADDRESS + 0x100);

      - execute: |
          __ap = savedAP;
          Message(0, "End Configure_ETR_CATU @0x%08X, AP 0x%08X", CATU_ADDRESS, CATU_AP);

    - name: Capture_ETR_CATU
      info: "Restart address translation unit"
      blocks:
      - execute: |
            // Helper variables
            __var savedAP = __ap;
            __var status = 0x00000000;

            Message(0, "Begin Capture_ETR_CATU @0x%08X, AP 0x%08X", CATU_ADDRESS, CATU_AP);

            // Ensure involved components are in a well-defined state.
            Sequence("TraceFlush");

            __ap = CATU_AP; // Set AP

            // Keep initial values and re-enable CATU before next capture.
            // Clears any remaning error bits.
            Write32(CATU_ADDRESS + 0x000, 0x00000001);

            status = Read32(CATU_ADDRESS + 0x100);
      - while: (status & 0x0100) == 1
        info: "Wait for READY cleared"
        timeout: 100
        blocks:
          - execute: |
              status = Read32(CATU_ADDRESS + 0x100);

      - execute: |
          __ap = savedAP;
          Message(0, "End Capture_ETR_CATU @0x%08X, AP 0x%08X", CATU_ADDRESS, CATU_AP);


# TPIU Component Snippets

    - debug-vars:
      vars: |
        // TPIU
        __var TPIU_ADDRESS    = 0xE0040000;  // Default TPIU Location for single-core systems
        __var TPIU_AP         = 0x00000000;
        __var SWO_PRESCALER   = 0x00000000; // TPIU Asynchronous Clock Prescaler Register
        __var TPIU_PRESCALER  = 0x00000000; // TPIU Asynchronous Clock Prescaler Register

    - name: Flush_TPIU
      blocks:
        - execute: |
            // Helper variables
            __var savedAP     = __ap;
            __var ffcrValue   = 0x00000000;
            __var ffsrValue   = 0x00000000;

            Message(0, "Begin Flush_TPIU @0x%08X, AP 0x%08X", TPIU_ADDRESS, TPIU_AP);
            
            __ap = TPIU_AP;  // Set AP

        - execute: |
            // Configure "local" TPIU for Sync Trace
            ffsrValue = Read32(TPIU_ADDRESS + 0x300);
        - if: ffsrValue & 0x2 == 0
          info: "Formatter not stopped, do it now"
          blocks:

          - execute: |
              // Flush the TPIU formatter so pending packets leave the trace port.
              ffcrValue = Read32(TPIU_ADDRESS + 0x304);
              ffcrValue &= ~(0x00001040); // Clear StopOnFlush and FlushOnManual
              ffcrValue |= 0x00001000;    // Stop after the manual flush completes
              Write32(TPIU_ADDRESS + 0x304, ffcrValue);
              ffcrValue |= 0x00000040;    // Trigger manual flush
              Write32(TPIU_ADDRESS + 0x304, ffcrValue);

          - execute: |
              ffcrValue = Read32(TPIU_ADDRESS + 0x304);
          - while: (ffcrValue & 0x40) != 0
            info: "Wait for TPIU manual flush to complete"
            timeout: 100
            blocks:
              - execute: |
                  ffcrValue = Read32(TPIU_ADDRESS + 0x304);

          - execute: |
              ffsrValue = Read32(TPIU_ADDRESS + 0x300);
          - while: (ffsrValue & 0x1) != 0
            info: "Wait for TPIU flush in progress to clear"
            timeout: 100
            blocks:
              - execute: |
                  ffsrValue = Read32(TPIU_ADDRESS + 0x300);

        - execute: |
            __ap = savedAP;
            Message(0, "End Flush_TPIU @0x%08X, AP 0x%08X", TPIU_ADDRESS, TPIU_AP);

    - name: Configure_TPIU
      blocks:
          - execute: |
                // Temporary - Parameters, set from debugger going forward

                // TEMP_TRACEOUT: replace with __traceout when available from debugger,
                //                or move trace mode decision to new built-in variable.
                __var swoTrace    = TEMP_TRACEOUT & 0x1;
                __var syncTrace   = TEMP_TRACEOUT & 0x2;
                __var bufferTrace = TEMP_TRACEOUT & 0x4;
                __var tracePortWidth = (TEMP_TRACEOUT >> 16) & 0x3F; // Parallel trace port size

                // Helper variables
                __var LAR_KEY   = 0xC5ACCE55;
                __var savedAP = __ap;

                Message(0, "Begin Configure_TPIU @0x%08X, AP 0x%08X", TPIU_ADDRESS, TPIU_AP);

                __ap = TPIU_AP; // Set AP

          - if: swoTrace != 0
            blocks:
              - execute: |
                  Write32(TPIU_ADDRESS + 0xFB0, LAR_KEY);       // TODO: Double-check if still necessary
                  Write32(TPIU_ADDRESS + 0x010, SWO_PRESCALER); // TPIU Asynchronous Clock Prescaler Register: No prescaling
                  Write32(TPIU_ADDRESS + 0x0F0, 0x00000002);    // TPIU Selected Pin Protocol Register: Select SWO 

          - if: syncTrace != 0
            blocks:
              - execute: |
                  Write32(TPIU_ADDRESS + 0xFB0, LAR_KEY);        // TODO: Double-check if still necessary
                  Write32(TPIU_ADDRESS + 0x010, TPIU_PRESCALER); // TPIU Asynchronous Clock Prescaler Register: No prescaling
                  Write32(TPIU_ADDRESS + 0x004, 1 << (tracePortWidth - 1));  // TPIU Current Synchronous Port Width
                  Write32(TPIU_ADDRESS + 0x0F0, 0x00000000);     // TPIU Selected Pin Protocol Register: Select Sync Trace Port
                  ffcrValue  = Read32(TPIU_ADDRESS + 0x304);
                  ffcrValue |= 0x00000002;                    // Enable formatter
                  Write32(TPIU_ADDRESS + 0x304, ffcrValue);      // TPIU FFCR

          - execute: |
                __ap = savedAP;
                Message(0, "End Configure_TPIU @0x%08X, AP 0x%08X", TPIU_ADDRESS, TPIU_AP);

    - name: TraceCapture_TPIU
      blocks:
      - execute: |
          // Helper variables
          __var LAR_KEY   = 0xC5ACCE55;
          __var savedAP = __ap;

          Message(0, "Begin TraceCapture_TPIU @0x%08X, AP 0x%08X", TPIU_ADDRESS, TPIU_AP);

          // Ensure involved components are in a well-defined state.
          Sequence("TraceFlush");

          // Configure TPIU if needed and enable formatter
          __ap = TPIU_AP; // Set AP
          ffcrValue  = Read32(TPIU_ADDRESS + 0x304);
          ffcrValue |= 0x00000002;                                // Enable formatter
          Write32(TPIU_ADDRESS + 0x304, ffcrValue);                  // TPIU FFCR
          __ap = savedAP;
          Message(0, "End TraceCapture_TPIU @0x%08X, AP 0x%08X", TPIU_ADDRESS, TPIU_AP);

# Trace Funnel Component Snippets

    - debug-vars:
      vars: |
        // Funnel
        __var FUNNEL_ADDRESS    = 0x00000000;
        __var FUNNEL_AP         = 0x00000000;
        __var FUNNEL_INPUT_MASK = 0x00000000; // Mask of trace inputs connected to funnel, enable all valid inputs by default.

    - name: Configure_Funnel
      blocks:
      - execute: |
          // Helper variables
          __var savedAP    = __ap;
          __var value      = 0x00000000;

          Message(0, "Begin ConfigureFunnel @0x%08X, AP 0x%08X", FUNNEL_ADDRESS, FUNNEL_AP);

          __ap = FUNNEL_AP; // Set AP

          value = Read32(FUNNEL_ADDRESS + 0x000);
          value &= ~0xFF;              // Clear existing funnel input enables, keep hold time
          value |= FUNNEL_INPUT_MASK;  // Keep hold time as is for now, could be made configurable if needed

      - execute: |
          Write32(FUNNEL_ADDRESS + 0x000, value); // Configure CoreSight Trace Funnel to enable selected trace sources

          __ap = savedAP;
          Message(0, "End Configure_Funnel @0x%08X, AP 0x%08X", FUNNEL_ADDRESS, FUNNEL_AP);

# Trace Replicator Component Snippets

    - debug-vars:
      vars: |
        // Replicator
        __var REPLICATOR_ADDRESS    = 0x00000000;
        __var REPLICATOR_AP         = 0x00000000;
        __var REPLICATOR_ID_FILTER0 = 0x00000000; // Default: all pass to output 0
        __var REPLICATOR_ID_FILTER1 = 0x00000000; // Default: all pass to output 1

    - name: Configure_Replicator
      blocks:
      - execute: |
          // Helper variables
          __var savedAP    = __ap;
          __var value      = 0x00000000;

          Message(0, "Begin Configure_Replicator @0x%08X, AP 0x%08X", REPLICATOR_ADDRESS, REPLICATOR_AP);

          __ap = REPLICATOR_AP; // Set AP

          Write32(REPLICATOR_ADDRESS + 0x000, REPLICATOR_ID_FILTER0);
          Write32(REPLICATOR_ADDRESS + 0x004, REPLICATOR_ID_FILTER1);

          __ap = savedAP;
          Message(0, "End Configure_Replicator @0x%08X, AP 0x%08X", REPLICATOR_ADDRESS, REPLICATOR_AP);

