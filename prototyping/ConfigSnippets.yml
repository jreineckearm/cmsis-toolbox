# TraceStart Example

    - name: TraceStart
      blocks:
      - execute: |
          // TEMP_TRACEOUT: replace with __traceout when available from debugger,
          //                or move trace mode decision to new built-in variable.
          __var swoTrace    = TEMP_TRACEOUT & 0x1;
          __var syncTrace   = TEMP_TRACEOUT & 0x2;
          __var bufferTrace = TEMP_TRACEOUT & 0x4;

          Message(0, "Begin TraceStart");

      - if: swoTrace != 0
        blocks:
          - execute: |
              // Configure SWO Trace (via TPIU)
              Sequence("Configure_TPIU");

      - if: syncTrace != 0
        blocks:
          - execute: |
              // Configure Sync Trace
              Sequence("Flush_TPIU");
              Sequence("Configure_TPIU");
              Sequence("Configure_Funnel");
              Sequence("Configure_ETF_HWFIFO");

      - if: bufferTrace != 0
        blocks:
          - execute: |
              // Configure Trace Buffer
              Sequence("Configure_Funnel");
              Sequence("Configure_ETF_CircularBuffer");

      - execute: |
          Message(0, "End TraceStart sequence");

# TraceStop Example

    - name: TraceStop
      blocks:
      - execute: |
          // TEMP_TRACEOUT: replace with __traceout when available from debugger,
          //                or move trace mode decision to new built-in variable.
          __var swoTrace    = TEMP_TRACEOUT & 0x1;
          __var syncTrace   = TEMP_TRACEOUT & 0x2;
          __var bufferTrace = TEMP_TRACEOUT & 0x4;

          Message(0, "Begin TraceStop");

      - if: swoTrace != 0
        blocks:
          - execute: |
              // Add device specific stop for SWO trace if needed.

      - if: syncTrace != 0 || bufferTrace != 0
        blocks:
          - execute: |
              // Final flush which also leaves TPIU and/or ETF turned off.
              Sequence("TraceFlush");

      - execute: |
          Message(0, "End TraceStop sequence");

