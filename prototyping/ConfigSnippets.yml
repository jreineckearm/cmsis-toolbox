# TraceFlush Example

    - name: TraceFlush
      blocks:
      - execute: |
          // TEMP_TRACEOUT: replace with __traceout when available from debugger,
          //                or move trace mode decision to new built-in variable.
          __var syncTrace   = TEMP_TRACEOUT & 0x2;
          __var bufferTrace = TEMP_TRACEOUT & 0x4;

          Message(0, "Begin TraceFlush");

      - if: syncTrace != 0
        blocks:
          - execute: |
              Sequence("Flush_TPIU");

      - if: bufferTrace != 0
        blocks:
          - execute: |
              Sequence("Flush_ETF");

      - execute: |
          Message(0, "End TraceFlush");
