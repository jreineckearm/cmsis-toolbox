debug-adapters:
  - name: "CMSIS-DAP@pyOCD"
    alias-name: ["CMSIS-DAP", "DAP-Link"]                  # alternative names that map to this debug adapter
    template: CMSIS-DAP-pyOCD.adapter.json                 # template files
    defaults:                                              # default values to use when nowhere specified
      gdbserver:
        active:                                            # add gdbserver: node under debugger: in cbuild-run.yml
        port: 3333
      telnet:
        port: 4444
      protocol: swd
      clock: 10000000
    user-interface:
      - section: Debug Interface
        description: Interface configuration for the debug port
        options:
          - name: Clock (kHz)
            description: Debug clock speed
            yml-node: clock
            type: number
            range: [10, 30000]
            scale: 1000
            default: 10000
          - name: Protocol
            description: Debug protocol
            yml-node: protocol
            type: enum
            values:
              - name: JTAG
                value: jtag
                description: Use JTAG interface (4 pins)
              - name: SWD
                value: swd
                description: Use Serial Wire Debug (SWD) interface (2 pins)
            default: swd
      - section: Telnet
        description: Serial input/output via semihosting or RTT channel 0
        yml-node: telnet
        select: on
        pname-options:
        options:
          - name: Telnet Mode
            description: Configure Serial I/O redirect
            yml-node: mode
            type: enum
            default: monitor
            values:
              - name: Telnet Server
                value: server
                description:  Serial I/O to Telnet server port
              - name: Debug Console
                value: console
                description:  Serial output to console (Debug console in VS Code)
              - name: Serial Monitor
                value: monitor
                description:  Serial I/O via TCP/IP port to VS Code Serial Monitor
              - name: Text File
                value: file
                description:  Serial output to file (default ./out/<solution-name>+<target-type>.<pname>.out)
              - name: Disabled
                value: off
                description:  Serial I/O disabled

      - section: Trace Interface
        description: Interface configuration for trace capture
        yml-node: trace
        options:
          - name: Mode
            description: Select pyOCD output mode for trace data
            yml-node: mode
            type: enum
            default: off
            values:
              - name: Off
                value: off
                description:  Trace output disabled
              - name: Server
                value: server
                description:  Trace output via TCP/IP server
              - name: File
                value: file
                description:  Trace output to file
          - name: Type
            description: Configure trace interface type
            yml-node: port-type
            type: enum
            default: swo-uart
            values:
              - name: SWO UART
                value: swo-uart
                description:  Trace output via SWO UART
              - name: SWO Manchester
                value: swo-manchester
                description:  Trace output via SWO Manchester
              - name: On-Chip Trace Buffer
                value: buffer
                description:  Trace output via On-Chip Trace Buffer
              - name: Synchronous Trace Port
                value: trace-port
                description:  Trace output via Synchronous Trace Port
          - name: Input Clock (kHz)
            description: Configure clock that is input to the trace interface component (SWO, Trace Port, or Trace Buffer)
            yml-node: input-clock
            type: number
            scale: 1000
            default: 10000
          - name: Output Clock (kHz)
            description: Configure clock of the output trace signal (SWO or Trace Port), use value of 0 to use same clock as input
            yml-node: output-clock
            type: number
            range: [0, 10000]
            scale: 1000
            default: 0
          - name: Server Port
            description: Port for the trace server
            yml-node: server-port
            type: number
            default: 5555
          - name: Trace Output File
            description: Path of raw trace output file
            yml-node: file
            type: file
            path-type: relative
            default: "./out/<solution-name>+<target-type>.trace"


